<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: Arial; padding:20px; background:#f5f5f5; }
    table { border-collapse: collapse; width:100%; background:white; }
    th, td { padding:10px; border:1px solid #ddd; text-align:center; }
    th { background:#222; color:white; }
    .strong { background:#d4edda; font-weight:bold; }
  </style>
</head>
<body>

<h2>Momentum Scanner</h2>

<table id="scannerTable">
  <thead>
    <tr>
      <th>Stock</th>
      <th>Today Volume</th>
      <th>Delivery %</th>
      <th>Signal</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>

function loadData() {

  google.script.run.withSuccessHandler(function(data){

    const tableBody = document.querySelector("#scannerTable tbody");
    tableBody.innerHTML = "";

    data.forEach(row => {

      const tr = document.createElement("tr");

      if(row.signal === "Strong Accumulation"){
        tr.classList.add("strong");
      }

      tr.innerHTML = `
        <td>${row.stock}</td>
        <td>${row.volume}</td>
        <td>${row.delivery}</td>
        <td>${row.signal}</td>
      `;

      tableBody.appendChild(tr);

    });

  }).getScannerResults();

}

window.onload = loadData;

</script>

</body>
</html>
