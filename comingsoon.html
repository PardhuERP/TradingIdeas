<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Edge - Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Background animation */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(0,255,150,0.15) 0%, transparent 70%);
  animation: moveBg 8s linear infinite;
}

@keyframes moveBg {
  0% { transform: translate(-20%, -20%); }
  50% { transform: translate(20%, 20%); }
  100% { transform: translate(-20%, -20%); }
}

.container {
  position: relative;
  text-align: center;
  padding: 40px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  box-shadow: 0 0 40px rgba(0,255,150,0.2);
  max-width: 500px;
  width: 90%;
}

h1 {
  font-size: 36px;
  font-weight: 600;
  color: #00ffae;
}

p {
  margin-top: 15px;
  font-size: 15px;
  color: #cbd5e1;
}

/* Feature tags */
.features {
  margin-top: 25px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}

.tag {
  padding: 8px 14px;
  background: rgba(0,255,150,0.1);
  border: 1px solid rgba(0,255,150,0.4);
  border-radius: 20px;
  font-size: 13px;
}

/* Countdown */
.countdown {
  margin-top: 25px;
  font-size: 20px;
  font-weight: bold;
  color: #00ffae;
}

/* Button */
.btn {
  margin-top: 25px;
  padding: 12px 25px;
  border: none;
  border-radius: 8px;
  background: #00ffae;
  color: black;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: #00cc88;
}

/* Footer */
.footer {
  margin-top: 20px;
  font-size: 12px;
  color: #94a3b8;
}
</style>
</head>

<body>

<div class="container">
  <h1>📊 Market Edge</h1>
  <p>Powerful Trading Insights. Smart Decisions. Profitable Moves.</p>

  <div class="features">
    <div class="tag">Live FII/DII Data</div>
    <div class="tag">Smart Signals</div>
    <div class="tag">BTST Scanner</div>
    <div class="tag">Intraday Alerts</div>
    <div class="tag">Volume Analysis</div>
    <div class="tag">AI Predictions</div>
  </div>

  <div class="countdown" id="countdown">
    Launching Soon...
  </div>

  <button class="btn">Notify Me</button>

  <div class="footer">
    Built for Traders 💹 | Stay Ahead of the Market
  </div>
</div>

<script>
// Simple countdown (optional)
const launchDate = new Date();
launchDate.setDate(launchDate.getDate() + 5);

const countdown = document.getElementById("countdown");

setInterval(() => {
  const now = new Date();
  const diff = launchDate - now;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hrs = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const mins = Math.floor((diff / (1000 * 60)) % 60);

  countdown.innerHTML = `${days}d ${hrs}h ${mins}m remaining`;
}, 1000);
</script>

</body>
</html>
