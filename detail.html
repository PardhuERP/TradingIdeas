<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Detail</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial;
  background: #020617;
  color: white;
  padding: 15px;
}

/* BACK */
.back {
  margin-bottom: 10px;
  cursor: pointer;
  font-size: 14px;
  opacity: 0.7;
}

/* HEADER */
.title {
  font-size: 18px;
  opacity: 0.7;
}

.price {
  font-size: 34px;
  font-weight: bold;
}

.change {
  font-size: 14px;
  margin-top: 5px;
}

.green { color: #22c55e; }
.red { color: #ef4444; }

/* CARD */
.card {
  background: #1e293b;
  border-radius: 20px;
  padding: 15px;
  margin-top: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.6);
}

.row {
  display: flex;
  justify-content: space-between;
  margin: 8px 0;
  font-size: 14px;
}

/* STATUS */
.status {
  margin-top: 10px;
  padding: 8px;
  border-radius: 10px;
  text-align: center;
  font-weight: bold;
}

.cheap { background: rgba(34,197,94,0.15); color: #22c55e; }
.fair { background: rgba(250,204,21,0.15); color: #facc15; }
.expensive { background: rgba(239,68,68,0.15); color: #ef4444; }

/* CHART */
.chart-box {
  margin-top: 20px;
  background: #1e293b;
  border-radius: 20px;
  padding: 10px;
  height: 200px; /* 🔥 REQUIRED */
}

canvas {
  width: 100% !important;
  height: 100% !important;
}
</style>
</head>

<body>

<div class="back" onclick="history.back()">⬅ Back</div>

<div class="title" id="name">--</div>
<div class="price" id="price">--</div>
<div class="change" id="change"></div>

<div class="card">
  <div class="row">
    <span>EPS</span>
    <span id="eps"></span>
  </div>

  <div class="row">
    <span>P/E</span>
    <span id="pe"></span>
  </div>

  <div id="status" class="status"></div>
</div>

<div class="chart-box">
  <canvas id="chart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

// 🔥 GET SYMBOL FROM URL
const params = new URLSearchParams(window.location.search);
const symbol = params.get("symbol");

// 🔥 YOUR GAS URL
const url = "https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec?action=market";

// 🔥 LOAD BASIC DATA
fetch(url)
.then(res => res.json())
.then(data => {

  const s = data.find(x => x.symbol === symbol);

  if (!s) {
    document.body.innerHTML = "Stock not found";
    return;
  }

  document.getElementById("name").innerText = s.name;
  document.getElementById("price").innerText = s.price;

  const changeEl = document.getElementById("change");
  changeEl.innerText = s.change + " (" + s.percent + "%)";
  changeEl.className = "change " + (s.change >= 0 ? "green" : "red");

  document.getElementById("eps").innerText = s.eps;
  document.getElementById("pe").innerText = s.pe;

  const statusEl = document.getElementById("status");
  statusEl.innerText = s.status;
  statusEl.className = "status " + s.status.toLowerCase();

});

// 🔥 LIVE MINI CHART (YAHOO)
// 🔥 LIVE MINI CHART (FIXED + CLEAN)
const ctx = document.getElementById("chart").getContext("2d");

fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?range=1d&interval=5m`)
.then(res => res.json())
.then(chartData => {

  const result = chartData.chart.result[0];
  const prices = result.indicators.quote[0].close;

  // 🔥 REMOVE NULL VALUES
  const filtered = prices.filter(p => p !== null);

  if (!filtered || filtered.length === 0) {
    console.log("No chart data");
    return;
  }

  const isUp = filtered[0] < filtered[filtered.length - 1];

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: filtered.map((_, i) => i),
      datasets: [{
        data: filtered,
        borderColor: isUp ? "#22c55e" : "#ef4444",
        borderWidth: 2,
        tension: 0.3,
        fill: false,
        pointRadius: 0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }},
      scales: {
        x: { display: false },
        y: { display: false }
      }
    }
  });

})
.catch(err => {
  console.log("Chart error:", err);
});
</script>

</body>
</html>
