<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

.card{
background:#1f2937;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

.title{
font-size:18px;
font-weight:bold;
margin-bottom:5px;
}

.row{
display:flex;
justify-content:space-between;
margin:3px 0;
}

body{
font-family:Arial;
background:linear-gradient(180deg,#020617,#0f172a);
color:white;
margin:0;
padding:20px;
}

.header{
text-align:center;
font-size:22px;
font-weight:bold;
margin-bottom:20px;
}

.card{
background:rgba(30,41,59,0.8);
padding:16px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 6px 20px rgba(0,0,0,0.4);
backdrop-filter:blur(6px);
}

.title{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

.row{
display:flex;
justify-content:space-between;
padding:4px 0;
font-size:15px;
}

.green{
color:#22c55e;
font-weight:bold;
}

.red{
color:#ef4444;
font-weight:bold;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#1f2937;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#334155;
}

.header{
text-align:center;
font-size:22px;
font-weight:bold;
margin-bottom:20px;
color:#e2e8f0;
}

</style>

</head>

<body>

<h2>📊 FII / DII Dashboard</h2>

<div id="today" class="card"></div>
<div id="yesterday" class="card"></div>
<div id="mtd" class="card"></div>
<button onclick="loadMonthly()">View Monthly Data</button>

<div id="monthly"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec?action=fiidashboard";

async function load(){

try{

const res = await fetch(API);
const data = await res.json();

document.getElementById("today").innerHTML=`

<div class="title">Today</div>

<div class="row">
<span>Date</span>
<span>${data.today.date}</span>
</div>

<div class="row">
<span>FII</span>
<span class="${color(data.today.fii)}">${data.today.fii}</span>
</div>

<div class="row">
<span>DII</span>
<span class="${color(data.today.dii)}">${data.today.dii}</span>
</div>

<div class="row">
<span>Net</span>
<span class="${color(data.today.net)}">${data.today.net}</span>
</div>

`;

document.getElementById("yesterday").innerHTML=`

<div class="title">Yesterday</div>

<div class="row">
<span>Date</span>
<span>${data.yesterday.date}</span>
</div>

<div class="row">
<span>FII</span>
<span class="${color(data.yesterday.fii)}">${data.yesterday.fii}</span>
</div>

<div class="row">
<span>DII</span>
<span class="${color(data.yesterday.dii)}">${data.yesterday.dii}</span>
</div>

<div class="row">
<span>Net</span>
<span class="${color(data.yesterday.net)}">${data.yesterday.net}</span>
</div>

`;

document.getElementById("mtd").innerHTML=`

<div class="title">Month To Date</div>

<div class="row">
<span>Month Start</span>
<span>${data.mtd.date}</span>
</div>

<div class="row">
<span>FII</span>
<span class="${color(data.mtd.fii)}">${data.mtd.fii}</span>
</div>

<div class="row">
<span>DII</span>
<span class="${color(data.mtd.dii)}">${data.mtd.dii}</span>
</div>

<div class="row">
<span>Net</span>
<span class="${color(data.mtd.net)}">${data.mtd.net}</span>
</div>
`;

}catch(e){

document.getElementById("today").innerHTML="Error loading";
document.getElementById("yesterday").innerHTML="Error loading";
document.getElementById("mtd").innerHTML="Error loading";

}

}
  
function color(val){
return Number(val) >= 0 ? "green" : "red";
}

async function loadMonthly(){

const res = await fetch(API.replace("fiidashboard","fiimonthly"));
const data = await res.json();

let html = `
<div class="card">

<div class="title">Monthly Institutional Flow</div>

<table style="width:100%;margin-top:8px;border-collapse:collapse">

<tr style="border-bottom:1px solid #475569">
<th align="left">Month</th>
<th>FII</th>
<th>DII</th>
<th>Net</th>
</tr>
`;

data.forEach(m=>{

html += `
<tr>

<td>${m.month}</td>

<td class="${color(m.fii)}">${m.fii}</td>

<td class="${color(m.dii)}">${m.dii}</td>

<td class="${color(m.net)}">${m.net}</td>

</tr>
`;

});

html += `</table></div>`;

document.getElementById("monthly").innerHTML = html;

}

load();

</script>

</body>
</html>
