<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:linear-gradient(180deg,#020617,#0f172a);
color:white;
margin:0;
padding:15px;
}

/* GRID FOR 3 BOXES */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-bottom:10px;
}

.card{
background:rgba(30,41,59,0.9);
padding:12px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.4);
backdrop-filter:blur(6px);
}

.title{
font-size:15px;
font-weight:bold;
margin-bottom:6px;
text-align:center;
}

.row{
display:flex;
justify-content:space-between;
font-size:13px;
padding:2px 0;
}

.green{color:#22c55e;font-weight:bold;}
.red{color:#ef4444;font-weight:bold;}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#1f2937;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#334155;
}

/* MONTH TABLE */
.tableCard{
background:rgba(30,41,59,0.9);
padding:15px;
border-radius:12px;
margin-top:10px;
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
padding:6px;
text-align:center;
border-bottom:1px solid #374151;
}

th{
color:#cbd5f5;
}

</style>

</head>

<body>

<h2 style="text-align:center;">📊 FII / DII Dashboard</h2>

<!-- 3 BOX GRID -->
<div class="grid">
<div id="today" class="card"></div>
<div id="yesterday" class="card"></div>
<div id="mtd" class="card"></div>
</div>

<button onclick="loadMonthly()">View Monthly Data</button>

<div id="monthly"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec?action=fiidashboard";

function color(val){
return Number(val) >= 0 ? "green" : "red";
}

function round(val){
return Math.round(Number(val));
}

async function load(){

try{

const res = await fetch(API);
const data = await res.json();

/* TODAY */
document.getElementById("today").innerHTML=`
<div class="title">Today</div>
<div class="row"><span>Dt:</span><span>${data.today.date}</span></div>
<div class="row"><span>FII</span><span class="${color(data.today.fii)}">${round(data.today.fii)}</span></div>
<div class="row"><span>DII</span><span class="${color(data.today.dii)}">${round(data.today.dii)}</span></div>
<div class="row"><span>Net</span><span class="${color(data.today.net)}">${round(data.today.net)}</span></div>
`;

/* YESTERDAY */
document.getElementById("yesterday").innerHTML=`
<div class="title">Yesterday</div>
<div class="row"><span>Dt:</span><span>${data.yesterday.date}</span></div>
<div class="row"><span>FII</span><span class="${color(data.yesterday.fii)}">${round(data.yesterday.fii)}</span></div>
<div class="row"><span>DII</span><span class="${color(data.yesterday.dii)}">${round(data.yesterday.dii)}</span></div>
<div class="row"><span>Net</span><span class="${color(data.yesterday.net)}">${round(data.yesterday.net)}</span></div>
`;

/* MTD */
document.getElementById("mtd").innerHTML=`
<div class="title">MTD</div>
<div class="row"><span>Dt:</span><span>${data.mtd.date}</span></div>
<div class="row"><span>FII</span><span class="${color(data.mtd.fii)}">${round(data.mtd.fii)}</span></div>
<div class="row"><span>DII</span><span class="${color(data.mtd.dii)}">${round(data.mtd.dii)}</span></div>
<div class="row"><span>Net</span><span class="${color(data.mtd.net)}">${round(data.mtd.net)}</span></div>
`;

}catch(e){

document.getElementById("today").innerHTML="Error";
document.getElementById("yesterday").innerHTML="Error";
document.getElementById("mtd").innerHTML="Error";

}

}

async function loadMonthly(){

const res = await fetch(API.replace("fiidashboard","fiimonthly"));
const data = await res.json();

let html = `
<div class="tableCard">

<div class="title">Monthly Institutional Flow</div>

<table>

<tr>
<th>Month</th>
<th>FII</th>
<th>DII</th>
<th>Net</th>
</tr>
`;

data.forEach(m=>{
html += `
<tr>
<td>${m.month}</td>
<td class="${color(m.fii)}">${round(m.fii)}</td>
<td class="${color(m.dii)}">${round(m.dii)}</td>
<td class="${color(m.net)}">${round(m.net)}</td>
</tr>
`;
});

html += `</table></div>`;

document.getElementById("monthly").innerHTML = html;

}

load();

</script>

</body>
</html>
