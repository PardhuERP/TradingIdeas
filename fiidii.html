<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

.card{
background:#1f2937;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

.title{
font-size:18px;
font-weight:bold;
margin-bottom:5px;
}

.row{
display:flex;
justify-content:space-between;
margin:3px 0;
}

</style>

</head>

<body>

<h2>📊 FII / DII Dashboard</h2>

<div id="today" class="card"></div>
<div id="yesterday" class="card"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec?action=fiidashboard";

async function load(){

document.getElementById("today").innerHTML="Loading...";
document.getElementById("yesterday").innerHTML="Loading...";

try{

const res=await fetch(API);
const data=await res.json();

document.getElementById("today").innerHTML=`
<div class="title">Today</div>
<div class="row"><span>Date</span><span>${data.today.date}</span></div>
<div class="row"><span>FII</span><span>${data.today.fii}</span></div>
<div class="row"><span>DII</span><span>${data.today.dii}</span></div>
<div class="row"><span>Net</span><span>${data.today.net}</span></div>
`;

document.getElementById("yesterday").innerHTML=`
<div class="title">Yesterday</div>
<div class="row"><span>Date</span><span>${data.yesterday.date}</span></div>
<div class="row"><span>FII</span><span>${data.yesterday.fii}</span></div>
<div class="row"><span>DII</span><span>${data.yesterday.dii}</span></div>
<div class="row"><span>Net</span><span>${data.yesterday.net}</span></div>
`;

}catch(e){

document.getElementById("today").innerHTML="Error loading data";
document.getElementById("yesterday").innerHTML="Error loading data";

}

}
load();

</script>

</body>
</html>
