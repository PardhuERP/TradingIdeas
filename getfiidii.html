<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FII DII</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
margin:8px;
}

textarea{
width:100%;
height:120px;
border-radius:6px;
border:none;
padding:10px;
}
</style>

</head>

<body>

<h2>FII / DII Data</h2>

<button onclick="openNSE()">View FII / DII Report</button>
<button onclick="showForm()">Add Data</button>

<div id="formBox" style="display:none;margin-top:15px">

<textarea id="jsonData" placeholder="Paste JSON here"></textarea>

<br><br>

<button onclick="saveJSON()">Submit</button>

</div>

<!-- hidden iframe prevents page redirect -->
<iframe name="hiddenFrame" style="display:none;"></iframe>

<script>

function openNSE(){
window.open("https://www.nseindia.com/api/fiidiiTradeReact","_blank");
}

function showForm(){
document.getElementById("formBox").style.display="block";
}

function saveJSON(){

const json = document.getElementById("jsonData").value.trim();

if(!json){
alert("Please paste JSON first");
return;
}

const form = document.createElement("form");

form.method="POST";
form.target="hiddenFrame";
form.action="https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec";

const actionInput=document.createElement("input");
actionInput.type="hidden";
actionInput.name="action";
actionInput.value="savefiijson";

const dataInput=document.createElement("input");
dataInput.type="hidden";
dataInput.name="data";
dataInput.value=json;

form.appendChild(actionInput);
form.appendChild(dataInput);

document.body.appendChild(form);

form.submit();

document.getElementById("jsonData").value="";

alert("Saved successfully");

}

</script>

</body>
</html>
