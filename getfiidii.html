<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FII DII</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
margin:8px;
}

textarea{
width:100%;
height:120px;
border-radius:6px;
border:none;
padding:10px;
}

</style>

</head>

<body>

<h2>FII / DII Data</h2>

<button onclick="openNSE()">View FII / DII Report</button>

<button onclick="showForm()">Add Data</button>

<div id="formBox" style="display:none;margin-top:15px">

<textarea id="jsonData"
placeholder="Paste JSON here"></textarea>

<br><br>

<button onclick="saveJSON()">Submit</button>

</div>

<script>

function openNSE(){

window.open(
"https://www.nseindia.com/api/fiidiiTradeReact",
"_blank"
);

}

function showForm(){
document.getElementById("formBox").style.display="block";
}

async function saveJSON(){

const json = document.getElementById("jsonData").value.trim();

if(!json){
alert("Please paste JSON first");
return;
}

try{

const response = await fetch(
"https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec",
{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:"action=savefiijson&data="+encodeURIComponent(json)
}
);

const text = await response.text();

console.log("Server response:",text);

alert("Saved successfully");

document.getElementById("jsonData").value="";

}catch(err){

console.error(err);

alert("Error sending data");

}

}

</script>

</body>
</html>
