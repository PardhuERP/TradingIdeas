<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FII DII</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

button{
padding:12px 18px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}
</style>

  <style>
button{
padding:10px 15px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
margin:8px;
}
  </style>

</head>

<body>

<h2>FII / DII Data</h2>

<button onclick="openNSE()">View FII / DII Report</button>

<button onclick="showForm()">Add Data</button>

<div id="formBox" style="display:none;margin-top:15px">

<textarea id="jsonData" 
placeholder="Please go back, don't do anything"
style="width:100%;height:120px"></textarea>

<br><br>

<button onclick="saveJSON()">Submit</button>

</div>
  
<script>

function openNSE(){

window.open(
"https://www.nseindia.com/api/fiidiiTradeReact",
"_blank"
);

}

  function showForm(){
document.getElementById("formBox").style.display="block";
}

function saveJSON(){

const json = document.getElementById("jsonData").value;

const form = document.createElement("form");

form.method = "POST";

form.action = "https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec";

const input1 = document.createElement("input");
input1.name = "action";
input1.value = "savefiijson";

const input2 = document.createElement("input");
input2.name = "data";
input2.value = json;

form.appendChild(input1);
form.appendChild(input2);

document.body.appendChild(form);

form.submit();

alert("Saved successfully");

}
</script>

</body>
</html>
