<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FII DII</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

button{
padding:12px 18px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}
</style>

</head>

<body>

<h2>FII / DII Data</h2>

<button onclick="openNSE()">View FII / DII Report</button>

<button onclick="showForm()">Add Data</button>

<div id="formBox" style="display:none;margin-top:15px">

<textarea id="jsonData" 
placeholder="Paste NSE JSON here"
style="width:100%;height:120px"></textarea>

<br><br>

<button onclick="saveJSON()">Submit</button>

</div>
  
<script>

function openNSE(){

window.open(
"https://www.nseindia.com/api/fiidiiTradeReact",
"_blank"
);

}

  function showForm(){
document.getElementById("formBox").style.display="block";
}

async function saveJSON(){

const json = document.getElementById("jsonData").value;

await fetch("https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
action:"savefiijson",
data:json
})

});

alert("Saved successfully");

}

</script>

</body>
</html>
