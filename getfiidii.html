<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FII DII Import</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
text-align:center;
}

.value{
font-size:22px;
margin:10px 0;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="card">

<h2>FII / DII Data</h2>

<div class="value">FII: <span id="fii">Loading...</span></div>
<div class="value">DII: <span id="dii">Loading...</span></div>
<div class="value">Net: <span id="net">Loading...</span></div>

<br>

<button onclick="saveData()">Save To Sheet</button>

</div>

<script>

let fii=0;
let dii=0;

async function loadFIIDII(){

try{

const res = await fetch("https://www.nseindia.com/api/fiidiiTradeReact");

const data = await res.json();

data.forEach(r=>{

if(String(r.category).includes("FII")){
fii = Number(r.netValue)||0;
}

if(String(r.category).includes("DII")){
dii = Number(r.netValue)||0;
}

});

document.getElementById("fii").innerText = fii;
document.getElementById("dii").innerText = dii;
document.getElementById("net").innerText = fii + dii;

}catch(e){

document.getElementById("fii").innerText="Error";
document.getElementById("dii").innerText="Error";
document.getElementById("net").innerText="Error";

}

}

async function saveData(){

await fetch("https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
action:"savefiidii",
payload:[
{category:"FII",netValue:fii},
{category:"DII",netValue:dii}
]
})

});

alert("Saved to sheet");

}

loadFIIDII();

</script>

</body>
</html>
