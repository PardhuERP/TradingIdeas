<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
}

.topbar {
  padding:10px;
  display:flex;
  justify-content:space-between;
}

select {
  background:#1e293b;
  color:white;
  border:none;
  padding:5px;
  border-radius:5px;
}

.container {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card {
  background:#1e293b;
  padding:12px;
  border-radius:12px;
  cursor:pointer;
}

.price { font-size:18px; font-weight:bold; }

.green { color:#22c55e; }
.red { color:#ef4444; }

canvas {
  width:100%;
  height:40px;
}

.alert {
  background:red;
  padding:3px;
  font-size:10px;
  text-align:center;
  border-radius:5px;
  margin-top:5px;
}

</style>
</head>

<body>

<div class="topbar">
  <div>📊 Market</div>
  <select id="sort">
    <option value="none">Sort</option>
    <option value="pe">P/E</option>
  </select>
</div>

<div id="grid" class="container"></div>

<script>
const url = "YOUR_GAS_URL?action=market";
let globalData = [];

function drawChart(canvas, data) {
  const ctx = canvas.getContext("2d");

  const max = Math.max(...data);
  const min = Math.min(...data);

  ctx.beginPath();

  data.forEach((v, i) => {
    let x = i * (canvas.width / data.length);
    let y = canvas.height - ((v - min) / (max - min)) * canvas.height;

    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });

  ctx.strokeStyle = "#22c55e";
  ctx.stroke();
}

function render(data) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.forEach(stock => {

    const card = document.createElement("div");
    card.className = "card";

    const changeClass = stock.change >= 0 ? "green" : "red";

    card.innerHTML = `
      <div>${stock.name}</div>
      <div class="price">${stock.price}</div>
      <div class="${changeClass}">
        ${stock.change} (${stock.percent}%)
      </div>
      <canvas></canvas>
      ${stock.pe > 25 ? '<div class="alert">⚠ High PE</div>' : ''}
    `;

    // 👉 click → detail
    card.onclick = () => {
      alert(
        stock.name + "\\nPE: " + stock.pe + "\\nEPS: " + stock.eps
      );
    };

    grid.appendChild(card);

    // draw chart
    drawChart(card.querySelector("canvas"), stock.history);
  });
}

fetch(url)
.then(res => res.json())
.then(data => {
  globalData = data;
  render(data);
});

// 🔥 SORT
document.getElementById("sort").onchange = (e) => {

  let val = e.target.value;

  if (val === "pe") {
    globalData.sort((a,b) => b.pe - a.pe);
  }

  render(globalData);
};

</script>

</body>
</html>
