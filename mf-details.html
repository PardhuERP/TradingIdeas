<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MF Details</title>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  margin:0;
}

.header {
  padding:15px;
  background:#1e293b;
  text-align:center;
  font-weight:bold;
}

.container {
  padding:15px;
}

.card {
  background:#1e293b;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
}

.big {
  font-size:22px;
  font-weight:bold;
}

.green { color:#22c55e; }
.red { color:#ef4444; }
</style>
</head>

<body>

<div class="header" id="title">Loading...</div>

<div class="container">

<div class="card">
  <div>NAV</div>
  <div class="big" id="nav">--</div>
  <div id="change">--</div>
</div>

<div class="card">
  <div>Returns</div>
  <div>1M: <span id="r1m"></span></div>
  <div>3M: <span id="r3m"></span></div>
  <div>1Y: <span id="r1y"></span></div>
  <div>3Y: <span id="r3y"></span></div>
  <div>5Y: <span id="r5y"></span></div>
</div>

</div>

<script>

// GET CODE
const params = new URLSearchParams(window.location.search);
const code = params.get("code");

// FETCH DATA
fetch(`https://api.mfapi.in/mf/${code}`)
.then(res => res.json())
.then(data => {

  const navData = data.data;

  const latest = parseFloat(navData[0].nav);
  const prev = parseFloat(navData[1].nav);

  const change = ((latest - prev)/prev * 100).toFixed(2);

  // Return function
  function calc(days){
    if(navData.length > days){
      const old = parseFloat(navData[days].nav);
      return ((latest - old)/old * 100).toFixed(2);
    }
    return "N/A";
  }

  // SET DATA
  document.getElementById("title").innerText = data.meta.scheme_name;

  document.getElementById("nav").innerText = "₹ " + latest;

  const chgEl = document.getElementById("change");
  chgEl.innerText = change + "%";
  chgEl.className = change >= 0 ? "green" : "red";

  function set(id, val){
    const el = document.getElementById(id);
    el.innerText = val + "%";
    el.className = val >= 0 ? "green" : "red";
  }

  set("r1m", calc(30));
  set("r3m", calc(90));
  set("r1y", calc(365));
  set("r3y", calc(1095));
  set("r5y", calc(1825));

})
.catch(() => {
  document.getElementById("title").innerText = "Error loading data";
});

</script>

</body>
</html>
