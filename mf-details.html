<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MF Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 15px;
}

h2 {
  margin-bottom: 10px;
}

.card {
  background: #1e293b;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2 id="title">Loading...</h2>
<div id="data"></div>

<script>

// Get code from URL
const urlParams = new URLSearchParams(window.location.search);
const code = urlParams.get("code");

const API = `https://api.mfapi.in/mf/${code}`;

fetch(API)
  .then(res => res.json())
  .then(data => {

    document.getElementById("title").innerText = data.meta.scheme_name;

    const container = document.getElementById("data");

    data.data.slice(0, 10).forEach(item => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        Date: ${item.date} <br>
        NAV: ₹${item.nav}
      `;

      container.appendChild(div);
    });

  });

</script>

</body>
</html>
