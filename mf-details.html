<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MF Details</title>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  padding:15px;
}
.card {
  background:#1e293b;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
}
</style>
</head>

<body>

<h2 id="title">Loading...</h2>
<div id="data"></div>

<script>

// GET CODE FROM URL
const params = new URLSearchParams(window.location.search);
const code = params.get("code");

if(!code){
  document.getElementById("title").innerText = "Invalid MF Code";
  throw new Error("No code");
}

// FETCH DATA
fetch(`https://api.mfapi.in/mf/${code}`)
.then(res => res.json())
.then(data => {

  const navData = data.data;

  if(!navData || navData.length === 0){
    document.getElementById("title").innerText = "No Data Found";
    return;
  }

  const latest = parseFloat(navData[0].nav);
  const prev = parseFloat(navData[1].nav);

  const change = (((latest - prev)/prev)*100).toFixed(2);

  function getReturn(days){
    if(navData.length > days){
      const old = parseFloat(navData[days].nav);
      return (((latest - old)/old)*100).toFixed(2);
    }
    return "N/A";
  }

  document.getElementById("title").innerText = data.meta.scheme_name;

  document.getElementById("data").innerHTML = `
    <div class="card">NAV: ₹${latest}</div>
    <div class="card">Change: ${change}%</div>

    <div class="card">1M Return: ${getReturn(30)}%</div>
    <div class="card">3M Return: ${getReturn(90)}%</div>
    <div class="card">1Y Return: ${getReturn(365)}%</div>
    <div class="card">3Y Return: ${getReturn(1095)}%</div>
    <div class="card">5Y Return: ${getReturn(1825)}%</div>
  `;

})
.catch(err => {
  document.getElementById("title").innerText = "Error Loading Data";
  console.log(err);
});

</script>

</body>
</html>
