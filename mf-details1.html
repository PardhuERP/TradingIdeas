<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MF Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 15px;
}

h2 {
  margin-bottom: 10px;
}

.card {
  background: #1e293b;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2 id="title">Loading...</h2>
<div id="data"></div>

<script>

// Get code
const urlParams = new URLSearchParams(window.location.search);
const code = urlParams.get("code");

fetch(`https://api.mfapi.in/mf/${code}`)
.then(res => res.json())
.then(data => {

  const navData = data.data;

  // Latest NAV
  const latest = parseFloat(navData[0].nav);
  const prev = parseFloat(navData[1].nav);

  // Change %
  const change = (((latest - prev) / prev) * 100).toFixed(2);

  // Helper function for returns
  function getReturn(days) {
    if(navData.length > days) {
      const old = parseFloat(navData[days].nav);
      return (((latest - old)/old)*100).toFixed(2);
    }
    return "N/A";
  }

  document.body.innerHTML = `
    <h2>${data.meta.scheme_name}</h2>

    <div>NAV: ₹${latest}</div>
    <div>Change: ${change}%</div>

    <hr>

    <div>1M Return: ${getReturn(30)}%</div>
    <div>3M Return: ${getReturn(90)}%</div>
    <div>1Y Return: ${getReturn(365)}%</div>
    <div>3Y Return: ${getReturn(1095)}%</div>
    <div>5Y Return: ${getReturn(1825)}%</div>

    <hr>

    <div style="color:gray">Note: AUM, Expense Ratio coming next upgrade</div>
  `;
});
</script>

</body>
</html>
