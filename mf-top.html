<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mutual Fund Screener</title>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  margin:0;
}

.header {
  padding:15px;
  background:#1e293b;
  text-align:center;
  font-weight:bold;
}

.container {
  padding:10px;
}

.card {
  background:#1e293b;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  cursor:pointer;
}

.green { color:#22c55e; }
.red { color:#ef4444; }

.small {
  font-size:12px;
  color:#94a3b8;
}

.filter {
  display:flex;
  gap:10px;
  padding:10px;
  flex-wrap:wrap;
}

select, input {
  flex:1;
  padding:8px;
  border-radius:8px;
  border:none;
}
</style>
</head>

<body>

<div class="header">📊 Mutual Fund Screener</div>

<div class="filter">

  <!-- PERIOD FILTER -->
  <select id="period">
    <option value="365">1 Year</option>
    <option value="1095">3 Year</option>
    <option value="1825">5 Year</option>
  </select>

  <!-- NAME FILTER -->
  <input type="text" id="nameFilter" placeholder="Name starts with">

  <!-- % FILTER -->
  <select id="percent">
    <option value="0">All</option>
    <option value="10">> 10%</option>
    <option value="15">> 15%</option>
    <option value="20">> 20%</option>
  </select>

  <!-- CUSTOM % -->
  <input type="number" id="customPercent" placeholder="Custom %" />

</div>

<div class="container" id="list">Loading...</div>

<script>

const API = "https://api.mfapi.in/mf";

let allResults = [];

// Load data once
fetch(API)
.then(res => res.json())
.then(async data => {

  for(let i=0; i<100; i++){

    const code = data[i].schemeCode;
    const name = data[i].schemeName;

    try {
      const res = await fetch(`https://api.mfapi.in/mf/${code}`);
      const d = await res.json();

      allResults.push({
        name,
        code,
        navData: d.data
      });

    } catch(e){}

  }

  applyFilter();

});

// Filter function
function applyFilter(){

  const days = parseInt(document.getElementById("period").value);

  const nameStart = document.getElementById("nameFilter").value.toLowerCase();
  const percentFilter = parseFloat(document.getElementById("percent").value);
  const customPercent = parseFloat(document.getElementById("customPercent").value);

  const minReturn = customPercent || percentFilter;

  const results = [];

  allResults.forEach(item => {

    const nav = item.navData;

    if(nav.length > days){

      const latest = parseFloat(nav[0].nav);
      const old = parseFloat(nav[days].nav);

      const ret = ((latest - old)/old * 100);

      // Name filter
      if(nameStart && !item.name.toLowerCase().startsWith(nameStart)){
        return;
      }

      // % filter
      if(ret < minReturn){
        return;
      }

      results.push({
        name: item.name,
        code: item.code,
        return: ret
      });
    }

  });

  // ❌ removed sorting + slicing
  display(results);

}

// Display
function display(data){

  const list = document.getElementById("list");
  list.innerHTML = "";

  if(data.length === 0){
    list.innerHTML = "No funds found";
    return;
  }

  data.forEach(item => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div>${item.name}</div>
      <div class="small">
        Return: 
        <span class="${item.return >= 0 ? 'green':'red'}">
          ${item.return.toFixed(2)}%
        </span>
      </div>
    `;

    div.onclick = () => {
      window.location.href = "mf-details.html?code=" + item.code;
    };

    list.appendChild(div);

  });

}

// Event listeners
document.getElementById("period").onchange = applyFilter;
document.getElementById("nameFilter").oninput = applyFilter;
document.getElementById("percent").onchange = applyFilter;
document.getElementById("customPercent").oninput = applyFilter;

</script>

</body>
</html>
