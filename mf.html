<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mutual Fund List</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #0f172a;
  color: white;
}

header {
  padding: 15px;
  background: #1e293b;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

.search-box {
  padding: 10px;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

.list {
  padding: 10px;
}

.card {
  background: #1e293b;
  margin-bottom: 10px;
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
}

.card:hover {
  background: #334155;
}

.name {
  font-size: 16px;
  font-weight: bold;
}

.code {
  font-size: 12px;
  color: #94a3b8;
}
</style>
</head>

<body>

<header>Mutual Fund List</header>

<div class="search-box">
  <input type="text" id="search" placeholder="Search Mutual Fund...">
</div>

<div class="list" id="mfList">Loading...</div>

<script>

const API = "https://api.mfapi.in/mf";
const CACHE_KEY = "mf_list_cache";
const CACHE_TIME = "mf_list_time";

// 1 day expiry
const EXPIRY = 24 * 60 * 60 * 1000;

let allData = [];

function loadData(){

  const cachedData = localStorage.getItem(CACHE_KEY);
  const cachedTime = localStorage.getItem(CACHE_TIME);

  // ✅ FIX: convert to number
  const isValidCache = cachedData && cachedTime && 
    (Date.now() - Number(cachedTime) < EXPIRY);

  if(isValidCache){
    console.log("⚡ Loaded from cache");
    allData = JSON.parse(cachedData);
    display(allData);
  } 
  else {
    console.log("🌐 Fetching fresh data");

    fetch(API)
      .then(res => {
        if(!res.ok) throw new Error("Network error");
        return res.json();
      })
      .then(data => {

        allData = data;

        // Save cache
        localStorage.setItem(CACHE_KEY, JSON.stringify(data));
        localStorage.setItem(CACHE_TIME, Date.now().toString());

        display(data);
      })
      .catch(err => {
        console.log(err);

        // 🔥 fallback → try cache even if expired
        if(cachedData){
          console.log("⚠ Using old cache");
          allData = JSON.parse(cachedData);
          display(allData);
        } else {
          document.getElementById("mfList").innerText = "Error loading data";
        }
      });
  }
}

loadData();

// Display
function display(data){
  const list = document.getElementById("mfList");
  list.innerHTML = "";

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="name">${item.schemeName}</div>
      <div class="code">Code: ${item.schemeCode}</div>
    `;

    div.onclick = () => {
      window.location.href = "mf-details.html?code=" + item.schemeCode;
    };

    list.appendChild(div);
  });
}

// Search
document.getElementById("search").addEventListener("input", function(){
  const value = this.value.toLowerCase();

  const filtered = allData.filter(item =>
    item.schemeName.toLowerCase().includes(value)
  );

  display(filtered);
});

</script>

</body>
</html>
