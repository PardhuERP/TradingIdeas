<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mutual Fund List</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #0f172a;
  color: white;
}

header {
  padding: 15px;
  background: #1e293b;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

.search-box {
  padding: 10px;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

.list {
  padding: 10px;
}

.card {
  background: #1e293b;
  margin-bottom: 10px;
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
}

.card:hover {
  background: #334155;
}

.name {
  font-size: 16px;
  font-weight: bold;
}

.code {
  font-size: 12px;
  color: #94a3b8;
}
</style>
</head>

<body>

<header>Mutual Fund List</header>

<div class="search-box">
  <input type="text" id="search" placeholder="Search Mutual Fund...">
</div>

<div class="list" id="mfList"></div>

<script>

// API URL
const API = "https://api.mfapi.in/mf";

let allData = [];

// Fetch Data
fetch(API)
  .then(res => res.json())
  .then(data => {
    allData = data;
    display(data);
  });

// Display Function
function display(data) {
  const list = document.getElementById("mfList");
  list.innerHTML = "";

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="name">${item.schemeName}</div>
      <div class="code">Code: ${item.schemeCode}</div>
    `;

    // Click → open details
    div.onclick = () => {
      window.location.href = "mf-details.html?code=" + item.schemeCode;
    };

    list.appendChild(div);
  });
}

// Search Filter
document.getElementById("search").addEventListener("input", function() {
  const value = this.value.toLowerCase();

  const filtered = allData.filter(item =>
    item.schemeName.toLowerCase().includes(value)
  );

  display(filtered);
});

</script>

</body>
</html>
