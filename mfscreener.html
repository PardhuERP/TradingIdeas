<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MF Screener Pro+</title>

<style>
body { background:#0f172a; color:white; font-family:Arial; margin:0; }

.header {
  padding:15px; background:#1e293b; text-align:center;
  font-weight:bold; font-size:18px;
}

.filter {
  display:flex; flex-wrap:wrap; gap:8px; padding:10px;
}

input, select {
  flex:1; padding:8px; border-radius:8px; border:none;
  font-size:14px;
}

.container { padding:10px; }

.card {
  background:#1e293b; padding:12px; margin-bottom:10px;
  border-radius:12px; box-shadow:0 2px 6px rgba(0,0,0,0.3);
}


.name { font-weight:bold; }

.green { color:#22c55e; }
.red { color:#ef4444; }

.small { font-size:12px; color:#94a3b8; }

.row { display:flex; justify-content:space-between; margin-top:5px; }
</style>
</head>

<body>

<div class="header">📊 MF Screener Pro+</div>

<div class="filter">

<input type="text" id="search" placeholder="Search fund..." oninput="applyFilter()">

<select id="period" onchange="applyFilter()">
<option value="1Y">1Y</option>
<option value="3Y">3Y</option>
<option value="5Y">5Y</option>
</select>

<select id="type" onchange="applyFilter()">
<option value="all">All</option>
<option value="Growth">Growth</option>
<option value="Regular">Regular</option>
<option value="Dividend">Dividend</option>
</select>

<input type="number" id="navMin" placeholder="Min NAV" oninput="applyFilter()">
<input type="number" id="navMax" placeholder="Max NAV" oninput="applyFilter()">

<input type="number" id="startNavMin" placeholder="Min Start NAV" oninput="applyFilter()">
<input type="number" id="yearsMin" placeholder="Min Years" oninput="applyFilter()">

<select id="sort" onchange="applyFilter()">
<option value="none">Sort</option>
<option value="returnHigh">Return High</option>
<option value="returnLow">Return Low</option>
<option value="ageHigh">Oldest</option>
<option value="navLow">Low NAV</option>
</select>

</div>

<div class="container" id="list">Loading...</div>

<!-- ✅ MOVE MODAL HERE -->
<div id="detailModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000000cc; z-index:999;">

<div style="background:#1e293b; margin:50px auto; padding:15px; border-radius:10px; width:90%; max-width:500px;">

<div style="display:flex; justify-content:space-between;">
<div id="detailTitle"></div>
<button onclick="closeDetails()">X</button>
</div>

<div id="detailContent" style="margin-top:10px;"></div>

</div>
</div>

</body>

<script>

const API = "https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec?action=mf";

let allData = [];

fetch(API)
.then(res => res.text())   // 🔥 always safe
.then(text => {

  let raw;

  try {
    raw = JSON.parse(text);
  } catch(e){
    console.error("Invalid JSON", text);
    document.getElementById("list").innerHTML = "❌ API Error";
    return;
  }

  let data = Array.isArray(raw) ? raw : raw.data;

  if (!Array.isArray(data)) {
    console.error("Invalid format", raw);
    return;
  }

  allData = data.map(f => {

    let years = 0;

    if(f["Start Date"]){
      const parts = f["Start Date"].split("-");
      const d = new Date(parts[2], parts[1]-1, parts[0]);
      years = (new Date() - d) / (1000*60*60*24*365);
    }

    f.years = years;

    return f;
  });

  applyFilter();

});

function applyFilter(){

const search = document.getElementById("search").value.toLowerCase();
const period = document.getElementById("period").value;
const type = document.getElementById("type").value;

const navMin = parseFloat(document.getElementById("navMin").value) || 0;
const navMax = parseFloat(document.getElementById("navMax").value) || Infinity;

const startNavMin = parseFloat(document.getElementById("startNavMin").value) || 0;
const yearsMin = parseFloat(document.getElementById("yearsMin").value) || 0;

const sort = document.getElementById("sort").value;

let filtered = allData.filter(f => {

const name = f.Name.toLowerCase();
const nav = parseFloat(f.NAV) || 0;
const startNav = parseFloat(f["Start NAV"]) || 0;
const years = f.years || 0;
const ret = parseFloat(f[period]) || 0;

if(search && !name.includes(search)) return false;
if(type !== "all" && f.Type !== type) return false;
if(nav < navMin || nav > navMax) return false;
if(startNav < startNavMin) return false;
if(years < yearsMin) return false;

return true;
});

// 🔥 SORTING
if(sort === "returnHigh"){
filtered.sort((a,b)=> (parseFloat(b[period])||0)-(parseFloat(a[period])||0));
}
else if(sort === "returnLow"){
filtered.sort((a,b)=> (parseFloat(a[period])||0)-(parseFloat(b[period])||0));
}
else if(sort === "ageHigh"){
filtered.sort((a,b)=> b.years - a.years);
}
else if(sort === "navLow"){
filtered.sort((a,b)=> (a.NAV||0)-(b.NAV||0));
}

display(filtered);

}

function display(data){

const list = document.getElementById("list");
list.innerHTML = "";

data.slice(0,100).forEach(f => {

const div = document.createElement("div");
div.className = "card";

div.onclick = () => openDetails(f);

div.innerHTML = `
<div class="name">${f.Name}</div>

<div class="row small">
<span>${f.Category || "N/A"}</span>
<span>${f.Type}</span>
</div>

<div class="row">
<span>NAV ₹${f.NAV}</span>
<span class="${f["Change%"]>=0?'green':'red'}">
${f["Change%"]}%
</span>
</div>
`;

list.appendChild(div);

});
}

  function openDetails(f){

document.getElementById("detailModal").style.display = "block";
document.getElementById("detailTitle").innerText = f.Name;

document.getElementById("detailContent").innerHTML = `

<div class="row"><span>NAV</span><span>₹${f.NAV}</span></div>
<div class="row"><span>Change</span><span>${f["Change%"]}%</span></div>

<div class="row"><span>Type</span><span>${f.Type}</span></div>
<div class="row"><span>Category</span><span>${f.Category}</span></div>

<div class="row"><span>Start NAV</span><span>₹${f["Start NAV"]}</span></div>
<div class="row"><span>Start Date</span><span>${f["Start Date"]}</span></div>

<div class="row"><span>1Y</span><span>${f["1Y"]}%</span></div>
<div class="row"><span>3Y</span><span>${f["3Y"]}%</span></div>
<div class="row"><span>5Y</span><span>${f["5Y"]}%</span></div>

`;
}

function closeDetails(){
document.getElementById("detailModal").style.display = "none";
}

</script>

</body>
</html>
