<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MF Screener Pro</title>

<style>
body { background:#0f172a; color:white; font-family:Arial; margin:0; }

.header {
  padding:15px; background:#1e293b; text-align:center;
  font-weight:bold; font-size:18px;
}

.filter {
  display:flex; flex-wrap:wrap; gap:8px; padding:10px;
}

input, select, button {
  flex:1; padding:8px; border-radius:8px; border:none;
  font-size:14px;
}

.container { padding:10px; }

.card {
  background:#1e293b; padding:12px; margin-bottom:10px;
  border-radius:12px; box-shadow:0 2px 6px rgba(0,0,0,0.3);
  cursor:pointer;
}

.name { font-weight:bold; margin-bottom:5px; }

.green { color:#22c55e; }
.red { color:#ef4444; }

.small { font-size:12px; color:#94a3b8; }

.row { display:flex; justify-content:space-between; margin-top:5px; }

#chartModal {
  display:none; position:fixed; top:0; left:0;
  width:100%; height:100%; background:#000000cc;
  z-index:999;
}

.modalBox {
  background:#1e293b; margin:50px auto; padding:15px;
  border-radius:10px; width:90%; max-width:500px;
}

.timeBtns button{
  margin:5px; padding:5px 10px;
}
</style>
</head>

<body>

<div class="header">📊 MF Screener Pro</div>

<div class="filter">
<input type="text" id="search" placeholder="Search..." oninput="applyFilter()">

<select id="period" onchange="applyFilter()">
<option value="1Y">1 Year</option>
<option value="3Y">3 Year</option>
<option value="5Y">5 Year</option>
</select>

<select id="percent" onchange="applyFilter()">
<option value="0">All</option>
<option value="10">>10%</option>
<option value="15">>15%</option>
<option value="20">>20%</option>
</select>

<select id="type" onchange="applyFilter()">
<option value="all">All</option>
<option value="Growth">Growth</option>
<option value="Regular">Regular</option>
<option value="Dividend">Dividend</option>
</select>

<select id="sort" onchange="applyFilter()">
<option value="none">Sort</option>
<option value="high">Return High → Low</option>
<option value="low">Return Low → High</option>
</select>

<input type="number" id="navMin" placeholder="Min NAV" oninput="applyFilter()">
<input type="number" id="navMax" placeholder="Max NAV" oninput="applyFilter()">
</div>

<div class="container" id="list">Loading...</div>

<!-- 📊 CHART MODAL -->
<div id="chartModal">
<div class="modalBox">

<div style="display:flex; justify-content:space-between;">
<div id="chartTitle">Chart</div>
<button onclick="closeChart()">X</button>
</div>

<!-- 🔥 TIME FILTER BUTTONS -->
<div class="timeBtns">
<button onclick="changeRange(30)">1M</button>
<button onclick="changeRange(90)">3M</button>
<button onclick="changeRange(365)">1Y</button>
<button onclick="changeRange(1825)">5Y</button>
</div>

<canvas id="mfChart" height="200"></canvas>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const API = "https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec?action=mf";

let allData = [];
let currentChartData = [];

fetch(API)
.then(res => res.json())
.then(data => {
  allData = data;
  applyFilter();
});

function applyFilter(){

const search = document.getElementById("search").value.toLowerCase();
const period = document.getElementById("period").value;
const percent = parseFloat(document.getElementById("percent").value);
const type = document.getElementById("type").value;
const sort = document.getElementById("sort").value;

const navMin = parseFloat(document.getElementById("navMin").value) || 0;
const navMax = parseFloat(document.getElementById("navMax").value) || Infinity;

const key = period;

let filtered = allData.filter(item => {

const name = item.Name.toLowerCase();
const ret = parseFloat(item[key]) || 0;
const nav = parseFloat(item.NAV) || 0;

if(search && !name.includes(search)) return false;
if(type !== "all" && item.Type !== type) return false;
if(ret < percent) return false;
if(nav < navMin || nav > navMax) return false;

return true;
});

if(sort === "high"){
filtered.sort((a,b) => (parseFloat(b[key])||0) - (parseFloat(a[key])||0));
}
else if(sort === "low"){
filtered.sort((a,b) => (parseFloat(a[key])||0) - (parseFloat(b[key])||0));
}

display(filtered);
}

function display(data){

const list = document.getElementById("list");
list.innerHTML = "";

data.slice(0,100).forEach(item => {

const div = document.createElement("div");
div.className = "card";

div.onclick = () => openChart(item.Code, item.Name);

div.innerHTML = `
<div class="name">${item.Name}</div>

<div class="row small">
<span>NAV: ₹${item.NAV}</span>
<span>${item.Type}</span>
</div>

<div class="row">
<span class="${item["Change%"] >= 0 ? 'green':'red'}">
${item["Change%"]}%
</span>
</div>

<div class="row small">
<span>1Y: ${item["1Y"]}%</span>
<span>3Y: ${item["3Y"]}%</span>
<span>5Y: ${item["5Y"]}%</span>
</div>

<button onclick="event.stopPropagation(); addToPortfolio('${item.Name}', ${item.NAV})">+ Add</button>
`;

list.appendChild(div);

});
}

// 🔥 CHART
let chartInstance;

function openChart(code, name){

document.getElementById("chartModal").style.display = "block";
document.getElementById("chartTitle").innerText = name;

fetch("https://api.mfapi.in/mf/" + code)
.then(res => res.json())
.then(data => {

currentChartData = data.data;

changeRange(365);

});
}

function changeRange(days){

const filtered = currentChartData.slice(0,days).reverse();

const labels = filtered.map(d => d.date);
const values = filtered.map(d => parseFloat(d.nav));

const color = values[values.length-1] >= values[0] ? "#22c55e" : "#ef4444";

if(chartInstance) chartInstance.destroy();

chartInstance = new Chart(document.getElementById("mfChart"), {
type: "line",
data: {
labels: labels,
datasets: [{
data: values,
borderColor: color,
borderWidth: 2,
tension: 0.3
}]
}
});
}

function closeChart(){
document.getElementById("chartModal").style.display = "none";
}

// 🔥 PORTFOLIO
function addToPortfolio(name, nav){

let portfolio = JSON.parse(localStorage.getItem("mf_portfolio") || "[]");

portfolio.push({
name: name,
buyPrice: nav,
date: new Date()
});

localStorage.setItem("mf_portfolio", JSON.stringify(portfolio));

alert("Added to portfolio ✅");
}

</script>

</body>
</html>
