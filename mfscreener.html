<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MF Screener Pro</title>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  margin:0;
}

.header {
  padding:15px;
  background:#1e293b;
  text-align:center;
  font-weight:bold;
  font-size:18px;
}

.filter {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  padding:10px;
}

input, select {
  flex:1;
  padding:8px;
  border-radius:8px;
  border:none;
  font-size:14px;
}

.container {
  padding:10px;
}

.card {
  background:#1e293b;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.3);
  cursor:pointer;
}

.name {
  font-weight:bold;
  margin-bottom:5px;
}

.green { color:#22c55e; }
.red { color:#ef4444; }

.small {
  font-size:12px;
  color:#94a3b8;
}

.row {
  display:flex;
  justify-content:space-between;
  margin-top:5px;
}

/* 🔥 CHART MODAL */
#chartModal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000000cc;
  z-index:999;
}

.modalBox {
  background:#1e293b;
  margin:50px auto;
  padding:15px;
  border-radius:10px;
  width:90%;
  max-width:500px;
}
</style>
</head>

<body>

<div class="header">📊 MF Screener Pro</div>

<div class="filter">

<input type="text" id="search" placeholder="Search..." oninput="applyFilter()">

<select id="period" onchange="applyFilter()">
  <option value="1Y">1 Year</option>
  <option value="3Y">3 Year</option>
  <option value="5Y">5 Year</option>
</select>

<select id="percent" onchange="applyFilter()">
  <option value="0">All</option>
  <option value="10">>10%</option>
  <option value="15">>15%</option>
  <option value="20">>20%</option>
</select>

<select id="type" onchange="applyFilter()">
  <option value="all">All</option>
  <option value="Growth">Growth</option>
  <option value="Regular">Regular</option>
  <option value="Dividend">Dividend</option>
</select>

<select id="sort" onchange="applyFilter()">
  <option value="none">Sort</option>
  <option value="high">Return High → Low</option>
  <option value="low">Return Low → High</option>
</select>

<input type="number" id="navMin" placeholder="Min NAV" oninput="applyFilter()">
<input type="number" id="navMax" placeholder="Max NAV" oninput="applyFilter()">

</div>

<div class="container" id="list">Loading...</div>

<!-- 📊 CHART MODAL -->
<div id="chartModal">
  <div class="modalBox">

    <div style="display:flex; justify-content:space-between;">
      <div id="chartTitle">Chart</div>
      <button onclick="closeChart()">X</button>
    </div>

    <canvas id="mfChart" height="200"></canvas>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const API = "https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec?action=mf";

let allData = [];

fetch(API)
.then(res => res.json())
.then(data => {
  allData = data;
  applyFilter();
});

function applyFilter(){

  const search = document.getElementById("search").value.toLowerCase();
  const period = document.getElementById("period").value;
  const percent = parseFloat(document.getElementById("percent").value);
  const type = document.getElementById("type").value;
  const sort = document.getElementById("sort").value;

  const navMin = parseFloat(document.getElementById("navMin").value) || 0;
  const navMax = parseFloat(document.getElementById("navMax").value) || Infinity;

  const key = period;

  let filtered = allData.filter(item => {

    const name = item.Name.toLowerCase();
    const ret = parseFloat(item[key]) || 0;
    const nav = parseFloat(item.NAV) || 0;

    if(search && !name.includes(search)) return false;
    if(type !== "all" && item.Type !== type) return false;
    if(ret < percent) return false;
    if(nav < navMin || nav > navMax) return false;

    return true;
  });

  if(sort === "high"){
    filtered.sort((a,b) => (parseFloat(b[key])||0) - (parseFloat(a[key])||0));
  }
  else if(sort === "low"){
    filtered.sort((a,b) => (parseFloat(a[key])||0) - (parseFloat(b[key])||0));
  }

  display(filtered);
}

function display(data){

  const list = document.getElementById("list");
  list.innerHTML = "";

  if(data.length === 0){
    list.innerHTML = "No funds found";
    return;
  }

  data.slice(0,100).forEach(item => {

    const div = document.createElement("div");
    div.className = "card";

    div.onclick = () => openChart(item.Code, item.Name); // 🔥 ADDED

    div.innerHTML = `
      <div class="name">${item.Name}</div>

      <div class="row small">
        <span>NAV: ₹${item.NAV}</span>
        <span>${item.Type}</span>
      </div>

      <div class="row">
        <span class="${item["Change%"] >= 0 ? 'green':'red'}">
          ${item["Change%"]}%
        </span>
      </div>

      <div class="row small">
        <span>1Y: ${item["1Y"]}%</span>
        <span>3Y: ${item["3Y"]}%</span>
        <span>5Y: ${item["5Y"]}%</span>
      </div>
    `;

    list.appendChild(div);

  });

}

// 🔥 CHART LOGIC
let chartInstance;

function openChart(code, name){

  document.getElementById("chartModal").style.display = "block";
  document.getElementById("chartTitle").innerText = name;

  fetch("https://api.mfapi.in/mf/" + code)
  .then(res => res.json())
  .then(data => {

    const navData = data.data.slice(0,100).reverse();

    const labels = navData.map(d => d.date);
    const values = navData.map(d => parseFloat(d.nav));

    if(chartInstance) chartInstance.destroy();

    chartInstance = new Chart(document.getElementById("mfChart"), {
      type: "line",
      data: {
        labels: labels,
        datasets: [{
          data: values,
          borderWidth: 2,
          tension: 0.3
        }]
      },
      options: {
        plugins: { legend: { display: false } },
        scales: {
          x: { display: false },
          y: { display: true }
        }
      }
    });

  });

}

function closeChart(){
  document.getElementById("chartModal").style.display = "none";
}

</script>

</body>
</html>
