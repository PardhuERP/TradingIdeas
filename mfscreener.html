<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 10px;
    }

    .card {
      background: white;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .title {
      font-weight: bold;
      font-size: 14px;
    }

    .nav {
      font-size: 18px;
      margin-top: 5px;
    }

    .green { color: green; }
    .red { color: red; }
  </style>
</head>

<body>

<h3>📊 Mutual Funds</h3>

<div id="data"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec?action=mf";

fetch(API)
.then(res => res.json())
.then(data => {

  const container = document.getElementById("data");

  data.forEach(fund => {

    const div = document.createElement("div");
    div.className = "card";

    const changeClass = fund["Change%"] >= 0 ? "green" : "red";

    div.innerHTML = `
      <div class="title">${fund.Name}</div>
      <div>Type: ${fund.Type}</div>
      <div class="nav">₹${fund.NAV}</div>
      <div class="${changeClass}">${fund["Change%"]}%</div>
    `;

    container.appendChild(div);
  });

});
</script>

</body>
</html>
