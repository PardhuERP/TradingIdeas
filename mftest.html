<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 10px;
}

h2 {
  margin-bottom: 10px;
}

/* FILTER BOX */
.filter-box {
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 15px;
}

input, select {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* CARD */
.card {
  background: white;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.title {
  font-weight: bold;
  font-size: 14px;
}

.nav {
  font-size: 18px;
  margin-top: 5px;
}

.green { color: green; }
.red { color: red; }

.small {
  font-size: 12px;
  color: gray;
}
</style>
</head>

<body>

<h2>📊 Mutual Fund Screener</h2>

<div class="filter-box">

<input type="text" id="search" placeholder="Search fund name">

<input type="number" id="minNav" placeholder="Min NAV">
<input type="number" id="maxNav" placeholder="Max NAV">

<input type="number" id="minStartNav" placeholder="Min Start NAV">

<input type="number" id="minYears" placeholder="Min Years">

<select id="sort">
  <option value="">Sort By</option>
  <option value="Change%">Change %</option>
  <option value="NAV">NAV</option>
</select>

<button onclick="applyFilter()">Apply Filter</button>

</div>

<div id="data"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec";

let allData = [];

fetch(API)
.then(res => res.json())
.then(data => {
  allData = data;
  render(data);
});

function calculateYears(startDate){
  if(!startDate) return 0;

  const parts = startDate.split("-");
  const d = new Date(parts[2], parts[1]-1, parts[0]);

  const diff = (new Date() - d) / (1000*60*60*24*365);
  return diff.toFixed(1);
}

function render(data){
  const container = document.getElementById("data");
  container.innerHTML = "";

  data.forEach(fund => {

    const change = parseFloat(fund["Change%"]);
    const cls = change >= 0 ? "green" : "red";

    const years = calculateYears(fund["Start Date"]);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="title">${fund.Name}</div>
      <div class="small">${fund.Category}</div>

      <div class="nav">₹${fund.NAV}</div>
      <div class="${cls}">${fund["Change%"]}%</div>

      <div class="small">
        Start NAV: ${fund["Start NAV"]} |
        Years: ${years}
      </div>
    `;

    container.appendChild(div);
  });
}

function applyFilter(){

  const search = document.getElementById("search").value.toLowerCase();
  const minNav = parseFloat(document.getElementById("minNav").value) || 0;
  const maxNav = parseFloat(document.getElementById("maxNav").value) || Infinity;
  const minStartNav = parseFloat(document.getElementById("minStartNav").value) || 0;
  const minYears = parseFloat(document.getElementById("minYears").value) || 0;
  const sort = document.getElementById("sort").value;

  let filtered = allData.filter(f => {

    const nav = parseFloat(f.NAV);
    const startNav = parseFloat(f["Start NAV"]);
    const years = calculateYears(f["Start Date"]);

    return (
      f.Name.toLowerCase().includes(search) &&
      nav >= minNav &&
      nav <= maxNav &&
      startNav >= minStartNav &&
      years >= minYears
    );
  });

  // SORT
  if(sort){
    filtered.sort((a,b) => parseFloat(b[sort]) - parseFloat(a[sort]));
  }

  render(filtered);
}

</script>

</body>
</html>
