<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Momentum Scanner</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.header{
background:#111827;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#222;
color:white;
}

.strong{
background:#d4edda;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">📊 Momentum Scanner</div>

<table id="scannerTable">

<thead>
<tr>
<th>Stock</th>
<th>Volume</th>
<th>Delivery %</th>
<th>Signal</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec?action=appoutput";

async function loadData(){

try{

let res = await fetch(API_URL);
let data = await res.json();

const tableBody = document.querySelector("#scannerTable tbody");

tableBody.innerHTML="";

data.forEach(row => {

let tr=document.createElement("tr");

if(row.HiddenAccumulation==="ACCUMULATION"){
tr.classList.add("strong");
}

tr.innerHTML=`

<td>${row.Stock}</td>
<td>${row.Score}</td>
<td>${row.HiddenAccumulation}</td>
<td>${row.SIGNAL}</td>

`;

tableBody.appendChild(tr);

});

}catch(e){

console.log(e);

}

}

loadData();

</script>

</body>
</html>
