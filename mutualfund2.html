<!DOCTYPE html>
<html>
<head>
  <title>Fund Details</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      padding: 10px;
      background: #111;
      color: white;
    }
  </style>
</head>

<body>

<h2 id="name">Loading...</h2>
<h3 id="nav"></h3>

<script>
let urlParams = new URLSearchParams(window.location.search);
let code = urlParams.get("code");

fetch("https://api.mfapi.in/mf/" + code)
  .then(res => res.json())
  .then(data => {
    document.getElementById("name").innerText = data.meta.scheme_name;
    document.getElementById("nav").innerText = "Latest NAV: ₹" + data.data[0].nav;
  });
</script>

</body>
</html>
