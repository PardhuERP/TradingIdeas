<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"> 
<title>Nifty Strategy Lab</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family: 'Segoe UI', Arial;
background: linear-gradient(180deg,#020617,#0f172a);
margin:0;
padding:10px;
color:#e2e8f0;
}

/* HEADER */
h1{
text-align:center;
font-size:22px;
margin-bottom:15px;
}

/* CONTAINER */
.container{
max-width:1000px;
margin:auto;
}

/* CARD */
.card{
background: rgba(30,41,59,0.8);
padding:16px;
margin-bottom:15px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
backdrop-filter: blur(6px);
}

/* INPUT */
label{
font-size:13px;
color:#94a3b8;
}

input, select{
width:100%;
padding:10px;
margin:6px 0 14px 0;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
font-size:14px;
outline:none;
}

/* BUTTON */
button{
padding:10px 14px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
font-weight:bold;
cursor:pointer;
margin:5px 4px 5px 0;
transition:0.2s;
}

button:hover{
background:#16a34a;
transform:scale(1.05);
}

/* STRATEGY BUTTONS */
#strategyList button{
background:#1f2937;
font-size:12px;
}

#strategyList button:hover{
background:#334155;
}

/* RESULT BOX */
.result-box{
padding:10px;
border-radius:8px;
margin-bottom:8px;
background:#0f172a;
border-left:4px solid #22c55e;
}

.green{ color:#22c55e; font-weight:bold;}
.red{ color:#ef4444; font-weight:bold;}

/* CHART */
canvas{
background:#020617;
border-radius:10px;
padding:10px;
}

/* TITLES */
.card h2{
font-size:16px;
margin-bottom:10px;
color:#cbd5f5;
}

/* MOBILE */
@media(max-width:600px){
h1{font-size:18px;}
}

/* 🔥 MOBILE READABILITY FIX */

/* GLOBAL FONT SIZE */
body{
font-size:16px;
}

/* HEADINGS */
h1{
font-size:22px !important;
}

.card h2{
font-size:18px !important;
}

/* LABELS */
label{
font-size:14px !important;
}

/* INPUTS */
input, select{
font-size:16px !important;
padding:12px !important;
}

/* BUTTON */
button{
font-size:15px !important;
padding:12px !important;
}

/* STRATEGY BUTTONS */
#strategyList button{
font-size:13px !important;
padding:8px 10px !important;
}

/* RESULT TEXT */
.result-box{
font-size:15px !important;
}

/* MOBILE EXTRA BOOST */
@media(max-width:600px){

body{
font-size:17px;
}

h1{
font-size:20px !important;
}

.card{
padding:18px !important;
}

}

input::placeholder{
font-size:14px;
color:#94a3b8;
}

    /* ===== APP HEADER ===== */
.app-header{
position:sticky;
top:0;
background:#020617;
padding:12px;
text-align:center;
font-size:18px;
font-weight:bold;
z-index:10;
border-bottom:1px solid #1e293b;
}

/* ===== CARD IMPROVEMENT ===== */
.card{
border-radius:16px !important;
padding:18px !important;
margin-bottom:14px !important;
}

/* ===== INPUT PREMIUM ===== */
input, select{
width:100%;
max-width:100%;
}

/* ===== BUTTON BIG ===== */
button{
width:100%;
padding:14px !important;
font-size:16px !important;
border-radius:10px !important;
}

/* ===== STRATEGY CHIPS ===== */
#strategyList{
display:flex;
flex-wrap:wrap;
gap:8px;
}

#strategyList button{
background:#1e293b;
border-radius:20px;
padding:8px 12px !important;
font-size:13px !important;
width:auto;
}

#strategyList button.active{
background:#22c55e;
color:#000;
}

/* ===== RESULT CARDS ===== */
.result-box{
background:#020617 !important;
padding:12px !important;
border-radius:10px !important;
font-size:15px !important;
border-left:4px solid #22c55e;
}

/* ===== PROFIT LOSS COLORS ===== */
.green{
color:#22c55e;
font-weight:bold;
font-size:16px;
}

.red{
color:#ef4444;
font-weight:bold;
font-size:16px;
}

/* ===== GRAPH CARD ===== */
canvas{
width:100% !important;
max-width:100%;
height:250px !important;
}

/* ===== SPACING ===== */
.card h2{
margin-bottom:12px !important;
}

/* ===== MOBILE ===== */
@media(max-width:600px){

body{
padding:10px;
}

h1{
font-size:18px;
}

.card{
padding:16px !important;
}

}

/* 🔥 STOP SIDE SCROLL */
html, body{
max-width:100%;
overflow-x:hidden;
}

/* ALL ELEMENTS INSIDE SCREEN */
*{
box-sizing:border-box;
}

/* CONTAINER FIX */
.container{
max-width:100%;
overflow:hidden;
}

img, table, canvas, div{
max-width:100%;
}

    /* 🔥 INPUT ZOOM + SHIFT FIX */
input, select, textarea{
font-size:16px !important; /* prevents mobile zoom */
transform:scale(1);
}

/* 🔥 FIX RIGHT SIDE SHIFT */
html, body{
width:100%;
overflow-x:hidden;
position:relative;
}

/* 🔥 FIX CONTAINER WIDTH ISSUE */
.container{
width:100%;
max-width:100%;
padding:0;
margin:0 auto;
}

/* 🔥 PREVENT ANY ELEMENT OVERFLOW */
*{
max-width:100%;
}

/* 🔥 FIX CARD STRETCH */
.card{
width:100%;
}

/* 🔥 FIX BUTTON STRETCH */
button{
width:100%;
}

/* 🔥 FIX STRATEGY BUTTON WRAP */
#strategyList{
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:flex-start;
}
body {
    background: #0f172a;
}

canvas {
    background: #020617;
    border-radius: 10px;
}
 
</style>
</head>

<body>

<div class="container">

<div class="app-header">

<div class="header-title">
📊 Nifty Strategy Lab
</div>

<div class="header-sub">
Options Strategy Builder & Analyzer
</div>

</div>

<!-- MARKET INPUT PANEL -->
<div class="card">
<h2>Market Inputs</h2>

<label>Spot Price</label>
<input type="number" id="spot" placeholder="Enter Spot Price">

<label>Market Bias</label>
<select id="bias">
    <option value="strong_bull">Strong Bullish</option>
    <option value="mild_bull">Mild Bullish</option>
    <option value="strong_bear">Strong Bearish</option>
    <option value="mild_bear">Mild Bearish</option>
    <option value="sideways">Sideways</option>
</select>

<label>IV Expectation</label>
<select id="iv">
    <option value="up">IV Increase</option>
    <option value="down">IV Decrease</option>
    <option value="neutral">Neutral</option>
</select>

<label>Days to Expiry</label>
<input type="number" id="dte" placeholder="Days to Expiry">

<label>Lot Size</label>
<input type="number" id="lot" value="65">

<button onclick="suggestStrategy()">Suggest Strategy</button>

</div>

<!-- STRATEGY LIST -->
<div class="card">
<h2>Strategy Suggestions</h2>
<div id="strategyList"></div>
</div>

<!-- STRATEGY BUILDER -->
<div class="card">
<h2>Strategy Builder</h2>
<div id="strategyBuilder"></div>
</div>

<!-- RESULTS -->
<div class="card">
<h2>Strategy Result</h2>
<div id="results"></div>

<label>Margin Used (Optional)</label>
<input type="number" id="margin" placeholder="Enter Margin Used">

<button onclick="calculateStrategy()">Calculate</button>
</div>

<!-- PAYOFF GRAPH -->
<div class="card">
<h2>Expiry Payoff Graph</h2>
<canvas id="payoffChart"></canvas>
</div>

</div>

<script>

let selectedStrategy = "";
let payoffData = [];
let chartInstance = null;

// ===============================
// STRATEGY SUGGESTION
// ===============================
function suggestStrategy(){

    const bias = document.getElementById("bias").value;

    let strategies = [];

    if(bias === "strong_bull"){
        strategies = ["Buy Call","Bull Call Spread","Sell Put","Bull Put Spread","Call Ratio Spread"];
    }
    else if(bias === "mild_bull"){
        strategies = ["Bull Put Spread","Covered Call","Buy Call"];
    }
    else if(bias === "strong_bear"){
        strategies = ["Buy Put","Bear Put Spread","Sell Call","Bear Call Spread","Put Ratio Spread"];
    }
    else if(bias === "mild_bear"){
        strategies = ["Bear Call Spread","Sell Call","Buy Put"];
    }
    else{
        strategies = ["Call Ratio Spread","Put Ratio Spread","Sell Call","Sell Put"];
    }

    let html = "";
    strategies.forEach(s=>{
        html += `<button onclick="selectStrategy(this,'${s}')">${s}</button>`;
    });

    document.getElementById("strategyList").innerHTML = html;
}

function selectStrategy(btn,strategy){
    document.querySelectorAll("#strategyList button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    loadStrategy(strategy);
}

// ===============================
// LOAD STRATEGY INPUT
// ===============================
function loadStrategy(strategy){

    selectedStrategy = strategy;

    let html = `<h3>${strategy}</h3>`;

    if(strategy.includes("Call") || strategy.includes("Put")){
        html += `
        <label>Strike Price</label>
        <input type="number" id="strike1">
        <label>Premium</label>
        <input type="number" id="premium1">`;
    }

    if(strategy.includes("Spread") || strategy.includes("Ratio")){
        html += `
        <label>Strike 1</label>
        <input type="number" id="strike1">
        <label>Premium 1</label>
        <input type="number" id="premium1">
        <label>Strike 2</label>
        <input type="number" id="strike2">
        <label>Premium 2</label>
        <input type="number" id="premium2">`;
    }

    if(strategy === "Covered Call" || strategy === "Protective Put"){
        html += `
        <label>Stock Price</label>
        <input type="number" id="stockPrice">`;
    }

    document.getElementById("strategyBuilder").innerHTML = html;
}

// ===============================
// CALCULATION + GRAPH
// ===============================
function calculateStrategy(){

    const spot = parseFloat(document.getElementById("spot").value);
    const lot = parseFloat(document.getElementById("lot").value);

    let strike1 = parseFloat(document.getElementById("strike1")?.value || 0);
    let premium1 = parseFloat(document.getElementById("premium1")?.value || 0);
    let strike2 = parseFloat(document.getElementById("strike2")?.value || 0);
    let premium2 = parseFloat(document.getElementById("premium2")?.value || 0);
    let stockPrice = parseFloat(document.getElementById("stockPrice")?.value || 0);

    let maxProfit=0, maxLoss=0, breakeven=0;

    if(selectedStrategy === "Buy Call"){
        maxLoss = premium1 * lot;
        breakeven = strike1 + premium1;
        maxProfit = "Unlimited";
    }

    document.getElementById("results").innerHTML = `
        <div><b>Max Profit:</b> ${maxProfit}</div>
        <div><b>Max Loss:</b> ${maxLoss}</div>
        <div><b>Breakeven:</b> ${breakeven}</div>
    `;

    // ✅ IMPORTANT → CALL GRAPH
    generatePayoffChart(spot, lot, strike1, premium1, strike2, premium2, stockPrice);
}

// ===============================
// PAYOFF ENGINE
// ===============================
function generatePayoffChart(spot, lot, strike1, premium1, strike2, premium2, stockPrice){

    let prices = [];
    let pnl = [];

    let min = Math.min(strike1, strike2 || strike1) - 500;
    let max = Math.max(strike1, strike2 || strike1) + 500;

    for(let price = min; price <= max; price += 25){

        let total = 0;

        if(selectedStrategy === "Buy Call"){
            total = Math.max(0, price - strike1) - premium1;
        }

        prices.push(price);
        pnl.push(total * lot);
    }

    drawChart(prices, pnl);
}

// ===============================
// DRAW CHART
// ===============================
function drawChart(prices, pnl){

    const ctx = document.getElementById('payoffChart').getContext('2d');

    if(chartInstance) chartInstance.destroy();

    let breakevens = [];

    const gradient = ctx.createLinearGradient(0, 0, 0, 400);
    gradient.addColorStop(0, "rgba(0,200,0,0.25)");
    gradient.addColorStop(1, "rgba(255,0,0,0.25)");

    chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: prices,
            datasets: [{
                data: pnl,
                borderColor: '#00bfff',
                borderWidth: 3,
                fill: true,
                tension: 0.4,
                pointRadius: 0,
                backgroundColor: gradient
            }]
        },

        options: {
            responsive: true,
            scales: {
                x: { ticks: { color: "#aaa" }},
                y: { ticks: { color: "#aaa" }}
            }
        },

        plugins: [

        {
            id:'zeroLine',
            afterDraw(chart){
                const y = chart.scales.y.getPixelForValue(0);
                const ctx = chart.ctx;

                ctx.beginPath();
                ctx.moveTo(chart.chartArea.left, y);
                ctx.lineTo(chart.chartArea.right, y);
                ctx.strokeStyle="white";
                ctx.stroke();
            }
        },

        {
            id:'spotLine',
            afterDraw(chart){
                const x = chart.scales.x.getPixelForValue(
                    parseFloat(document.getElementById("spot").value)
                );
                const ctx = chart.ctx;

                ctx.beginPath();
                ctx.moveTo(x, chart.chartArea.top);
                ctx.lineTo(x, chart.chartArea.bottom);
                ctx.strokeStyle="yellow";
                ctx.stroke();
            }
        }

        ]
    });
}

</script>

</body>
</html>
