<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.header{
background:#111827;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
padding:10px;
}

.card{
background:#1e293b;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.row{
display:flex;
justify-content:space-between;
margin:3px 0;
}

.stock{
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">📦 High Delivery Stocks</div>

<div class="container" id="box">
Loading...
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec?action=delivery";

async function load(){

const res=await fetch(API);

const data=await res.json();

let html="";

data.forEach(s=>{

html+=`

<div class="card">

<div class="stock">${s.stock}</div>

<div class="row">
<span>Date</span>
<span>${s.date}</span>
</div>

<div class="row">
<span>Delivery Qty</span>
<span>${s.deliveryQty}</span>
</div>

<div class="row">
<span>Delivery %</span>
<span>${s.deliveryPer}%</span>
</div>

</div>

`;

});

document.getElementById("box").innerHTML=html;

}

load();

</script>

</body>

</html>
