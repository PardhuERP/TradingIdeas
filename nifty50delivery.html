<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.header{
background:#111827;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.date{
text-align:center;
margin-top:10px;
font-size:16px;
}

.update{
text-align:center;
margin-top:10px;
font-size:14px;
color:#9ca3af;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border-bottom:1px solid #374151;
text-align:center;
}

th{
background:#1f2937;
}

</style>

</head>

<body>

<div class="header">

<span>📦 High Delivery Nifty50</span>

<button class="back-btn" onclick="goBack()">⬅ Back</button>

</div>

<div class="date" id="date">Loading...</div>

<table>

<thead>
<tr>
<th>Stock</th>
<th>Delivery Qty</th>
<th>Delivery %</th>
</tr>
</thead>

<tbody id="data"></tbody>

</table>

<!-- NEW LINE -->
<div class="update" id="lastUpdate"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec?action=delivery";

async function load(){

const res = await fetch(API);
const json = await res.json();

document.getElementById("date").innerText="Date : "+json.date;

let html="";

json.stocks.forEach(s=>{

html+=`
<tr>
<td>${s.stock}</td>
<td>${s.deliveryQty}</td>
<td>${s.deliveryPer}%</td>
</tr>
`;

});

document.getElementById("data").innerHTML=html;


// LAST UPDATE LOGIC
let now = new Date();
let updateDate = new Date(json.date);

if(now.getHours() < 22){
updateDate.setDate(updateDate.getDate()-1);
}

document.getElementById("lastUpdate").innerText =
"Last Update : " + updateDate.toLocaleDateString("en-IN");

}

load();

</script>

</body>
</html>
