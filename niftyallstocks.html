<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.header{
background:#111827;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.date{
text-align:center;
margin-top:10px;
font-size:16px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border-bottom:1px solid #374151;
text-align:center;
}

th{
background:#1f2937;
}

</style>

</head>

<body>

<div class="header">📊 Nifty All Stocks</div>

<div class="date" id="date"></div>

<table>

<thead>

<tr>
<th>Stock</th>
<th>Price</th>
<th>Turnover</th>
<th>Delivery Qty</th>
<th>Delivery %</th>
</tr>

</thead>

<tbody id="data"></tbody>

</table>

<script>

const API="https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec?action=niftyall";

async function load(){

try{

const res = await fetch(API);
const json = await res.json();

document.getElementById("date").innerText="Date : "+(json.date || "");

let html="";

// if no stocks returned
if(!json.stocks || json.stocks.length===0){

html=`<tr><td colspan="5">No data available</td></tr>`;

}else{

json.stocks.forEach(s=>{

html+=`
<tr>
<td>${s.stock}</td>
<td>${s.price}</td>
<td>${s.turnover}</td>
<td>${s.deliveryQty}</td>
<td>${s.deliveryPer}%</td>
</tr>
`;

});

}

document.getElementById("data").innerHTML=html;

}catch(e){

document.getElementById("data").innerHTML=
`<tr><td colspan="5">Error loading data</td></tr>`;

}

}

load();

</script>

</body>
</html>
