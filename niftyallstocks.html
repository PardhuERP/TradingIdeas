<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.header{
background:#111827;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.date{
text-align:center;
margin-top:10px;
font-size:16px;
}

.controls{
display:flex;
justify-content:center;
gap:10px;
margin:10px;
}

input{
padding:8px;
border-radius:5px;
border:none;
}

button{
padding:8px 12px;
border:none;
border-radius:5px;
background:#1f2937;
color:white;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border-bottom:1px solid #374151;
text-align:center;
}

th{
background:#1f2937;
}

.high{
background:#065f46;
}

</style>

</head>

<body>

<div class="header">📊 NSE All EQ Stocks</div>

<div class="date" id="date"></div>

<div class="controls">

<input type="text" id="search" placeholder="Search stock..." onkeyup="render()">

<button onclick="sortDelivery()">Sort Delivery %</button>

</div>

<table>

<thead>

<tr>
<th>Stock</th>
<th>Price</th>
<th>Turnover</th>
<th>Delivery Qty</th>
<th>Delivery %</th>
</tr>

</thead>

<tbody id="data"></tbody>

</table>

<script>

const API="https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec?action=niftyall";

let stocks=[];
let sorted=false;

async function load(){

try{

const res=await fetch(API);
const json=await res.json();

let d=new Date(json.date);

document.getElementById("date").innerText="Date : "+d.toISOString().split("T")[0];

stocks=json.stocks || [];

render();

}catch(e){

document.getElementById("data").innerHTML=
`<tr><td colspan="5">Error loading data</td></tr>`;

}

}

function render(){

let html="";

let search=document.getElementById("search").value.toUpperCase();

let filtered=stocks.filter(s=>s.stock.toUpperCase().includes(search));

filtered.forEach(s=>{

let rowClass="";

if(Number(s.deliveryPer)>=70){
rowClass="high";
}

html+=`
<tr class="${rowClass}">
<td>${s.stock}</td>
<td>${s.price}</td>
<td>${s.turnover}</td>
<td>${s.deliveryQty}</td>
<td>${s.deliveryPer}%</td>
</tr>
`;

});

document.getElementById("data").innerHTML=html;

}

function sortDelivery(){

stocks.sort((a,b)=>b.deliveryPer-a.deliveryPer);

render();

}

load();

</script>

</body>
</html>
