<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Nifty Dashboard</title>

<style>

body {
  font-family: Arial;
  background: #111;
  color: #fff;
  margin: 0;
  overflow: hidden; /* 💣 NO SCROLL */
}

/* 🔥 FULL SCREEN GRID */
.container {
  display: grid;
  grid-template-rows: auto auto 1fr;
  height: 100vh;
}

/* HEADER */
.header {
  text-align: center;
  padding: 10px;
  font-size: 18px;
  background: #000;
}

/* METER */
.meter-box {
  padding: 10px;
  text-align: center;
}

.meter {
  width: 90%;
  height: 15px;
  background: #333;
  margin: auto;
  border-radius: 10px;
}

.meter-fill {
  height: 100%;
  border-radius: 10px;
}

/* CARDS GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 8px;
}

/* CARD */
.card {
  background: #1e1e1e;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
}

.title {
  font-size: 12px;
  color: #00ffcc;
}

.value {
  font-size: 16px;
  font-weight: bold;
}

</style>
</head>

<body>

<div class="container">

  <div class="header">📊 NIFTY LIVE</div>

  <div id="meter"></div>

  <div id="data" class="grid"></div>

</div>

<script>

const API_URL = "PASTE_YOUR_GAS_URL";

function loadData() {

  fetch(API_URL)
    .then(res => res.json())
    .then(data => {

      let html = "";
      let strength = 0;

      data.forEach(row => {

        let value = row[1];

        if (row[0] === "Strength") {
          strength = Math.round(row[1]);
          value = strength;
        }

        let color = "#fff";

        if (row[0] === "Signal") {
          if (row[1].includes("BOOM")) color = "lime";
          else if (row[1].includes("CRASH")) color = "red";
        }

        html += `
          <div class="card">
            <div class="title">${row[0]}</div>
            <div class="value" style="color:${color}">${value}</div>
          </div>
        `;
      });

      document.getElementById("data").innerHTML = html;

      // 💣 METER
      const meterHTML = `
        <div class="meter-box">
          <div class="meter">
            <div class="meter-fill" style="
              width:${Math.min(Math.abs(strength),100)}%;
              background:${strength >= 0 ? "lime" : "red"};
            "></div>
          </div>
          <div>${strength}</div>
        </div>
      `;

      document.getElementById("meter").innerHTML = meterHTML;
    });
}

// 🔄 AUTO UPDATE
setInterval(loadData, 5000);
loadData();

</script>

</body>
</html>
