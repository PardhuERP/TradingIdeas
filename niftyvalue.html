<!DOCTYPE html>
<html>
<head>
  <title>Nifty Dashboard</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 300px;
      margin: auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h2 { margin-bottom: 10px; }
    .green { color: #22c55e; }
    .red { color: #ef4444; }
  </style>
</head>

<body>

<div class="card">
  <h2>📊 NIFTY</h2>
  <p id="price">Loading...</p>
  <p id="change"></p>
  <hr>
  <p id="eps"></p>
  <p id="pe"></p>
  <p id="status"></p>
</div>

<script>
  const url = "https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec?action=nifty"; // 🔥 paste your GAS URL
 fetch(url)
    .then(res => res.json())
    .then(data => {

      document.getElementById("price").innerText = data.price;
      document.getElementById("change").innerText = data.change + " (" + data.percent + "%)";
      document.getElementById("pe").innerText = data.pe;
      document.getElementById("status").innerText = data.status;

    });
</script>

</body>
</html>
