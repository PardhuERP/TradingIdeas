<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ValuEdge Dashboard</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 15px;
}

.card {
  width: 100%;
  background: rgba(30, 41, 59, 0.95);
  border-radius: 25px;
  padding: 30px 20px;
  box-shadow: 0 0 40px rgba(0,0,0,0.7);
  text-align: center;
}

.title {
  font-size: 20px;
  opacity: 0.7;
}

.price {
  font-size: 42px;
  font-weight: bold;
  margin: 10px 0;
}

.change {
  font-size: 18px;
  margin-bottom: 20px;
}

.green { color: #22c55e; }
.red { color: #ef4444; }

.row {
  display: flex;
  justify-content: space-between;
  margin: 12px 0;
  font-size: 18px;
}

.label { opacity: 0.6; }
.value { font-weight: bold; }

/* 🔥 GAUGE */
.gauge-container {
  margin: 25px 0;
}

canvas {
  width: 100%;
  height: 150px;
}

.status-text {
  margin-top: 10px;
  font-size: 18px;
  font-weight: bold;
}

.footer {
  margin-top: 15px;
  font-size: 12px;
  opacity: 0.5;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="title">📊 NIFTY 50</div>

    <div id="price" class="price">Loading...</div>
    <div id="change" class="change"></div>

    <div class="row">
      <div class="label">EPS</div>
      <div id="eps" class="value"></div>
    </div>

    <div class="row">
      <div class="label">P/E Ratio</div>
      <div id="pe" class="value"></div>
    </div>

    <!-- 🔥 GAUGE -->
    <div class="gauge-container">
      <canvas id="gauge"></canvas>
      <div id="status" class="status-text"></div>
    </div>

    <div class="footer">ValuEdge 🚀</div>

  </div>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec?action=nifty";

function drawGauge(pe) {
  const canvas = document.getElementById("gauge");
  const ctx = canvas.getContext("2d");

  canvas.width = 300;
  canvas.height = 150;

  const centerX = 150;
  const centerY = 130;
  const radius = 100;

  // Background arcs
  drawArc(ctx, centerX, centerY, radius, Math.PI, Math.PI * 1.33, "#22c55e"); // cheap
  drawArc(ctx, centerX, centerY, radius, Math.PI * 1.33, Math.PI * 1.66, "#facc15"); // fair
  drawArc(ctx, centerX, centerY, radius, Math.PI * 1.66, Math.PI * 2, "#ef4444"); // expensive

  // Needle position
  const maxPE = 40;
  const angle = Math.PI + (pe / maxPE) * Math.PI;

  const needleLength = 80;
  const x = centerX + needleLength * Math.cos(angle);
  const y = centerY + needleLength * Math.sin(angle);

  ctx.beginPath();
  ctx.moveTo(centerX, centerY);
  ctx.lineTo(x, y);
  ctx.strokeStyle = "white";
  ctx.lineWidth = 3;
  ctx.stroke();
}

function drawArc(ctx, x, y, r, start, end, color) {
  ctx.beginPath();
  ctx.arc(x, y, r, start, end);
  ctx.strokeStyle = color;
  ctx.lineWidth = 10;
  ctx.stroke();
}

  fetch(url)
    .then(res => res.json())

      document.getElementById("price").innerText = data.price;

      changeEl.innerText = data.change + " (" + data.percent + "%)";
      changeEl.className = "change " + (data.change >= 0 ? "green" : "red");
