<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nifty Value Edge</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 15px;
}

.card {
  background: rgba(30, 41, 59, 0.95);
  border-radius: 25px;
  padding: 25px;
  box-shadow: 0 0 40px rgba(0,0,0,0.7);
  text-align: center;
}

.title { font-size: 18px; opacity: 0.7; }

.price {
  font-size: 40px;
  font-weight: bold;
  margin: 10px 0;
}

.change { font-size: 16px; margin-bottom: 15px; }

.green { color: #22c55e; }
.red { color: #ef4444; }

.row {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
}

.label { opacity: 0.6; }
.value { font-weight: bold; }

/* 🔥 GAUGE */
.gauge {
  width: 200px;
  height: 100px;
  margin: 20px auto;
  position: relative;
}

.gauge svg {
  width: 100%;
  height: 100%;
}

.needle {
  width: 3px;
  height: 70px;
  background: white;
  position: absolute;
  bottom: 50%;
  left: 50%;
  transform-origin: bottom center;
  transform: rotate(0deg) translateX(-50%);
  transition: 0.5s ease;
}

.center-dot {
  width: 12px;
  height: 12px;
  background: white;
  border-radius: 50%;
  position: absolute;
  bottom: 50%;
  left: 50%;
  transform: translate(-50%, 50%);
}

.status {
  margin-top: 10px;
  font-weight: bold;
}

.footer {
  margin-top: 10px;
  font-size: 12px;
  opacity: 0.5;
}

  .card {
  position: relative;
}
</style>
</head>

<body>

<div class="container">
  
  <div class="card">
    <!-- 🔥 NIFTY MINI GAUGE -->
<div id="miniGauge" style="
  position:absolute;
  top:15px;
  right:15px;
  width:90px;
  height:90px;
">

  <div style="font-size:10px; text-align:center; opacity:0.7;">NIFTY</div>

  <svg viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="40" stroke="#1e293b" stroke-width="8" fill="none"/>
    
    <circle id="progressCircle"
      cx="50" cy="50" r="40"
      stroke="#22c55e"
      stroke-width="8"
      fill="none"
      stroke-dasharray="251"
      stroke-dashoffset="251"
      transform="rotate(-90 50 50)"
    />
  </svg>

  <div id="miniValue" style="
    position:absolute;
    top:35px;
    left:0;
    width:100%;
    text-align:center;
    font-size:12px;
    font-weight:bold;
  ">--</div>

</div>

    <div class="title">📊 NIFTY 50</div>

    <div id="price" class="price">--</div>
    <div id="change" class="change"></div>

    <div class="row">
      <div class="label">EPS</div>
      <div id="eps" class="value"></div>
    </div>

    <div class="row">
      <div class="label">P/E</div>
      <div id="pe" class="value"></div>
    </div>
    <div style="display:flex; justify-content:space-between; font-size:12px;">
  <span>Cheap</span>
  <span>Fair</span>
  <span>Expensive</span>
</div>

    <!-- 🔥 GAUGE -->
    <div class="gauge">
      <svg viewBox="0 0 200 100">
        <!-- Cheap -->
        <path d="M10 100 A90 90 0 0 1 70 20" stroke="#22c55e" stroke-width="15" fill="none"/>
        <!-- Fair -->
        <path d="M70 20 A90 90 0 0 1 130 20" stroke="#facc15" stroke-width="15" fill="none"/>
        <!-- Expensive -->
        <path d="M130 20 A90 90 0 0 1 190 100" stroke="#ef4444" stroke-width="15" fill="none"/>
      </svg>

      <div id="needle" class="needle"></div>
      <div class="center-dot"></div>
    </div>

    <div id="status" class="status"></div>

    <div class="footer">ValuEdge 🚀</div>

  </div>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec?action=nifty";

// 🎯 PE GAUGE
function updateGauge(pe) {

  let angle = 0;

  if (pe <= 15) angle = (pe / 15) * 60;
  else if (pe <= 22) angle = 60 + ((pe - 15) / 7) * 60;
  else {
    if (pe > 40) pe = 40;
    angle = 120 + ((pe - 22) / 18) * 60;
  }

  document.getElementById("needle").style.transform =
    `rotate(${angle - 90}deg) translateX(-50%)`;
}


// 🔥 LABEL + ARROW
function getLabel(v){
  if(v > 1.2) return "🔥 STRONG";
  if(v >= 1) return "NORMAL";
  if(v >= 0.8) return "WEAK";
  return "❌ BEAR";
}

function getArrow(v){
  if(v > 1.2) return "↑";
  if(v < 0.8) return "↓";
  return "→";
}


// 🔥 MINI GAUGE
function updateMiniGauge(value){

  if(!value || isNaN(value)) return; // 🛑 safety

  const circle = document.getElementById("progressCircle");
  const text = document.getElementById("miniValue");

  let percent = Math.min(Math.max(value, 0.5), 1.5);
  percent = (percent - 0.5) / 1.0;

  const circumference = 251;
  const offset = circumference - (percent * circumference);

  circle.style.strokeDashoffset = offset;

  // 🎨 color
  let color = "#facc15";

  if(value > 1.2) color = "#22c55e";
  else if(value < 0.8) color = "#ef4444";

  circle.style.stroke = color;

  // 🔥 glow
  circle.style.filter = "drop-shadow(0 0 6px " + color + ")";

  // 🧠 label + value
  text.innerHTML = `
    <div style="font-size:10px">${getArrow(value)} ${getLabel(value)}</div>
    <div>${value.toFixed(2)}</div>
  `;
}


// 🚀 LOAD DATA
function loadData() {

  fetch(url)
    .then(res => res.json())
    .then(data => {

      console.log("API:", data); // debug

      document.getElementById("price").innerText = data.price;

      const changeEl = document.getElementById("change");
      changeEl.innerText = data.change + " (" + data.percent + "%)";
      changeEl.className = "change " + (data.change >= 0 ? "green" : "red");

      document.getElementById("eps").innerText = data.eps;
      document.getElementById("pe").innerText = data.pe;
      document.getElementById("status").innerText = data.status;

      updateGauge(parseFloat(data.pe));

      // 🔥 SAFE CALL
      if(data.niftyValue !== undefined){
        updateMiniGauge(Number(data.niftyValue));
      }

    })
    .catch(err => {
      console.error("API Error:", err);
    });
}


// 🔄 AUTO REFRESH
loadData();
setInterval(loadData, 10000);
</script>
      

</body>
</html>
