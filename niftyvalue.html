<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nifty Dashboard</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

/* 🔥 FULL SCREEN CONTAINER */
.container {
  width: 100%;
  max-width: 420px;
  padding: 15px;
}

/* 🔥 BIG CARD */
.card {
  width: 100%;
  background: rgba(30, 41, 59, 0.95);
  border-radius: 25px;
  padding: 30px 20px;
  box-shadow: 0 0 40px rgba(0,0,0,0.7);
  text-align: center;
}

/* TITLE */
.title {
  font-size: 20px;
  opacity: 0.7;
}

/* 🔥 BIG PRICE */
.price {
  font-size: 42px;
  font-weight: bold;
  margin: 10px 0;
}

/* CHANGE */
.change {
  font-size: 18px;
  margin-bottom: 20px;
}

.green { color: #22c55e; }
.red { color: #ef4444; }

/* INFO ROW */
.row {
  display: flex;
  justify-content: space-between;
  margin: 12px 0;
  font-size: 18px;
}

.label { opacity: 0.6; }
.value { font-weight: bold; }

/* 🔥 STATUS BAR */
.status-bar {
  margin-top: 20px;
  padding: 12px;
  border-radius: 12px;
  font-size: 18px;
  font-weight: bold;
}

.fair {
  background: rgba(250, 204, 21, 0.2);
  color: #facc15;
}

.cheap {
  background: rgba(34,197,94,0.2);
  color: #22c55e;
}

.expensive {
  background: rgba(239,68,68,0.2);
  color: #ef4444;
}

/* FOOTER */
.footer {
  margin-top: 15px;
  font-size: 12px;
  opacity: 0.5;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="title">📊 NIFTY 50</div>

    <div id="price" class="price">Loading...</div>
    <div id="change" class="change"></div>

    <div class="row">
      <div class="label">EPS</div>
      <div id="eps" class="value"></div>
    </div>

    <div class="row">
      <div class="label">P/E Ratio</div>
      <div id="pe" class="value"></div>
    </div>

    <div id="statusBox" class="status-bar"></div>

    <div class="footer">By Pardhu 🚀</div>

  </div>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec?action=nifty";

function loadData() {
  fetch(url)
    .then(res => res.json())
    .then(data => {

      document.getElementById("price").innerText = data.price;

      const changeEl = document.getElementById("change");
      changeEl.innerText = data.change + " (" + data.percent + "%)";
      changeEl.className = "change " + (data.change >= 0 ? "green" : "red");

      document.getElementById("eps").innerText = data.eps;
      document.getElementById("pe").innerText = data.pe;

      const statusBox = document.getElementById("statusBox");
      statusBox.innerText = data.status;

      if (data.pe < 15) statusBox.className = "status-bar cheap";
      else if (data.pe <= 22) statusBox.className = "status-bar fair";
      else statusBox.className = "status-bar expensive";

    });
}

loadData();
setInterval(loadData, 10000);
</script>

</body>
</html>
