<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Investment Calculator</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:0;
}

.header{
background:#111827;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.toggle{
display:flex;
margin:10px;
background:#1f2937;
border-radius:8px;
overflow:hidden;
}

.toggle button{
flex:1;
padding:10px;
border:none;
background:none;
color:white;
font-weight:bold;
}

.active{
background:#22c55e;
color:black;
}

.container{
padding:12px;
}

.card{
background:#1e293b;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:none;
font-size:14px;
}

button.calc{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-weight:bold;
}

.result{
margin-top:10px;
}

.row{
display:flex;
justify-content:space-between;
padding:4px 0;
}

.green{color:#22c55e;}
.yellow{color:#facc15;}

canvas{
margin-top:10px;
background:#111827;
border-radius:10px;
}

.yearly{
font-size:13px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="header">📊 Investment Calculator</div>

<div class="toggle">
<button id="sipBtn" class="active" onclick="switchType('sip')">SIP Monthly</button>
<button id="lumpBtn" onclick="switchType('lump')">Lumpsum</button>
</div>

<div class="container">

<div class="card">

<input type="number" id="amount" placeholder="Enter monthly amount (₹)">
<input type="number" id="years" placeholder="Enter years (Eg: 5)">
<input type="number" id="rate" placeholder="Expected return % (Eg: 12)">

<button class="calc" onclick="calculate()">Calculate</button>

<div id="result" class="result"></div>

<canvas id="chart" height="150"></canvas>

<div id="yearly" class="yearly"></div>

</div>

</div>

<script>

let type="sip";

function switchType(t){
type=t;

document.getElementById("sipBtn").classList.remove("active");
document.getElementById("lumpBtn").classList.remove("active");

if(t==="sip"){
document.getElementById("sipBtn").classList.add("active");
document.getElementById("amount").placeholder="Enter monthly SIP (₹)";
}else{
document.getElementById("lumpBtn").classList.add("active");
document.getElementById("amount").placeholder="Enter one-time amount (₹)";
}
}

function calculate(){

let amount=Number(document.getElementById("amount").value);
let years=Number(document.getElementById("years").value);
let rate=Number(document.getElementById("rate").value)/100;

if(!amount||!years||!rate){
alert("Fill all fields");
return;
}

let months=years*12;
let mRate=rate/12;

let future=0;

if(type==="sip"){
future=amount*((Math.pow(1+mRate,months)-1)/mRate)*(1+mRate);
}else{
future=amount*Math.pow(1+rate,years);
}

let invested= type==="sip"? amount*months:amount;

document.getElementById("result").innerHTML=`

<div class="row">
<span>Invested</span>
<span>₹ ${Math.round(invested)}</span>
</div>

<div class="row">
<span>Future Value</span>
<span class="green">₹ ${Math.round(future)}</span>
</div>

<div class="row">
<span>Profit</span>
<span class="yellow">₹ ${Math.round(future-invested)}</span>
</div>

`;

drawChart(invested,future);
yearBreakdown(amount,years,rate);

}

// 🔵 Simple Circle Chart
function drawChart(inv,fut){

let canvas=document.getElementById("chart");
let ctx=canvas.getContext("2d");

ctx.clearRect(0,0,canvas.width,canvas.height);

let total=fut;
let investedAngle=(inv/total)*2*Math.PI;

ctx.beginPath();
ctx.moveTo(100,75);
ctx.fillStyle="#22c55e";
ctx.arc(100,75,60,0,investedAngle);
ctx.fill();

ctx.beginPath();
ctx.moveTo(100,75);
ctx.fillStyle="#facc15";
ctx.arc(100,75,60,investedAngle,2*Math.PI);
ctx.fill();

}

// 📊 Yearly Breakdown
function yearBreakdown(amount,years,rate){

let html="<b>Yearly Growth</b><br>";

for(let i=1;i<=years;i++){

let val;

if(type==="sip"){
let m=i*12;
let r=rate/12;
val=amount*((Math.pow(1+r,m)-1)/r)*(1+r);
}else{
val=amount*Math.pow(1+rate,i);
}

html+=`Year ${i}: ₹ ${Math.round(val)}<br>`;
}

document.getElementById("yearly").innerHTML=html;

}

</script>

</body>
</html>
