<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#020617;
  color:white;
}

.topbar {
  padding:10px;
  display:flex;
  justify-content:space-between;
}

button {
  background:#1e293b;
  border:none;
  color:white;
  padding:8px 12px;
  border-radius:8px;
}

.container {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card {
  background:#1e293b;
  padding:12px;
  border-radius:15px;
}

.price { font-weight:bold; font-size:18px; }

.green { color:#22c55e; }
.red { color:#ef4444; }

.status {
  margin-top:5px;
  font-size:12px;
  text-align:center;
  padding:4px;
  border-radius:6px;
}

.cheap { background:#064e3b; }
.fair { background:#713f12; }
.expensive { background:#7f1d1d; }

/* ALERT */
.alert {
  border:2px solid red;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity:0.5; }
}

/* POPUP */
.popup {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#020617;
  padding:20px;
  border-top-left-radius:20px;
  border-top-right-radius:20px;
  display:none;
}

canvas {
  width:100%;
  height:60px;
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="sortData('pe')">Sort PE</button>
  <button onclick="sortData('change')">Sort Move</button>
</div>

<div id="grid" class="container"></div>

<div id="popup" class="popup"></div>

<script>
const url = "https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec?action=market";
let globalData = [];

fetch(url)
.then(res => res.json())
.then(data => {
  globalData = data;
  render(data);
});

function render(data) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.forEach(stock => {

    const card = document.createElement("div");
    card.className = "card";

    if (stock.pe > 25) card.classList.add("alert");

    card.onclick = () => openDetail(stock);

    card.innerHTML = `
      <div>${stock.name}</div>
      <div class="price">${stock.price}</div>
      <div class="${stock.change >=0 ? 'green':'red'}">
        ${stock.percent}%
      </div>

      <canvas id="chart-${stock.name}"></canvas>

      <div class="status ${stock.status.toLowerCase()}">
        ${stock.status}
      </div>
    `;

    grid.appendChild(card);

    drawChart(stock.mini, `chart-${stock.name}`);
  });
}

/* MINI CHART */
function drawChart(data, id) {
  const canvas = document.getElementById(id);
  const ctx = canvas.getContext("2d");

  const max = Math.max(...data);
  const min = Math.min(...data);

  ctx.beginPath();

  data.forEach((val, i) => {
    const x = (i / data.length) * canvas.width;
    const y = canvas.height - ((val - min)/(max-min)) * canvas.height;

    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.stroke();
}

/* POPUP DETAIL */
function openDetail(stock) {
  const popup = document.getElementById("popup");

  popup.innerHTML = `
    <h2>${stock.name}</h2>
    <p>Price: ${stock.price}</p>
    <p>EPS: ${stock.eps}</p>
    <p>PE: ${stock.pe}</p>
    <p>Status: ${stock.status}</p>
    <br>
    <button onclick="closePopup()">Close</button>
  `;

  popup.style.display = "block";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

/* SORT */
function sortData(type) {

  if(type === "pe") {
    globalData.sort((a,b) => a.pe - b.pe);
  } else {
    globalData.sort((a,b) => b.percent - a.percent);
  }

  render(globalData);
}
</script>

</body>
</html>
