<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #020617;
  color: white;
}

.container {
  padding: 10px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* CARD */
.card {
  background: #1e293b;
  border-radius: 15px;
  padding: 15px;
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

.title {
  font-size: 14px;
  opacity: 0.7;
}

.price {
  font-size: 20px;
  font-weight: bold;
}

.change {
  font-size: 13px;
}

.green { color: #22c55e; }
.red { color: #ef4444; }

.row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  margin-top: 5px;
}

.status {
  margin-top: 8px;
  padding: 5px;
  text-align: center;
  border-radius: 8px;
  font-size: 12px;
}

.cheap { background: rgba(34,197,94,0.2); color: #22c55e; }
.fair { background: rgba(250,204,21,0.2); color: #facc15; }
.expensive { background: rgba(239,68,68,0.2); color: #ef4444; }

</style>
</head>

<body>

<div class="container" id="grid"></div>

<script>
const url = "https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec?action=market";

fetch(url)
.then(res => res.json())
.then(data => {

  const grid = document.getElementById("grid");

  data.forEach(stock => {

    const card = document.createElement("div");
    card.className = "card";

    const changeClass = stock.change >= 0 ? "green" : "red";
    const statusClass = stock.status.toLowerCase();

    card.innerHTML = `
      <div class="title">${stock.name}</div>
      <div class="price">${stock.price}</div>
      <div class="change ${changeClass}">
        ${stock.change} (${stock.percent}%)
      </div>

      <div class="row">
        <span>EPS</span>
        <span>${stock.eps}</span>
      </div>

      <div class="row">
        <span>P/E</span>
        <span>${stock.pe}</span>
      </div>

      <div class="status ${statusClass}">
        ${stock.status}
      </div>
    `;

    grid.appendChild(card);
  });

});
</script>

</body>
</html>
