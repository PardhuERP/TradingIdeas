<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #020617;
  color: white;
  font-family: Arial;
}

/* HEADER */
.header {
  padding: 10px;
  display: flex;
  justify-content: space-between;
}

select {
  background: #1e293b;
  color: white;
  border: none;
  padding: 5px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px;
}

/* CARD */
.card {
  background: #1e293b;
  padding: 12px;
  border-radius: 12px;
  cursor: pointer;
}

.price { font-size: 18px; font-weight: bold; }

.green { color: #22c55e; }
.red { color: #ef4444; }

.status {
  margin-top: 5px;
  font-size: 12px;
  text-align: center;
  padding: 4px;
  border-radius: 6px;
}

.cheap { background:#22c55e33; color:#22c55e; }
.fair { background:#facc1533; color:#facc15; }
.expensive { background:#ef444433; color:#ef4444; }

/* MODAL */
.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content {
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:400px;
}
</style>
</head>

<body>

<div class="header">
  <h3>Nifty 50 Dashboard</h3>

  <select onchange="sortData(this.value)">
    <option value="default">Default</option>
    <option value="pe">Sort by PE</option>
  </select>
</div>

<div id="grid" class="grid"></div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>

const url = "https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec?action=nifty50";
let globalData = [];

function loadData() {
  fetch(url)
  .then(res => res.json())
  .then(data => {
    globalData = data;
    render(data);
  });
}

function render(data) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.forEach(stock => {

    const changeClass = stock.change >= 0 ? "green" : "red";
    const statusClass = stock.status.toLowerCase();

    const alert = stock.pe > 25 ? "⚠️" : "";

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div>${stock.name} ${alert}</div>
      <div class="price">${stock.price}</div>
      <div class="${changeClass}">
        ${stock.change} (${stock.percent}%)
      </div>

      <div class="status ${statusClass}">
        ${stock.status}
      </div>
    `;

    card.onclick = () => openModal(stock);

    grid.appendChild(card);
  });
}

function openModal(stock) {

  document.getElementById("modal").style.display = "flex";

  document.getElementById("modalContent").innerHTML = `
    <h2>${stock.name}</h2>
    <p>Price: ${stock.price}</p>
    <p>P/E: ${stock.pe}</p>
    <p>Status: ${stock.status}</p>

    <canvas id="chart" height="100"></canvas>
  `;

  drawChart();
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function sortData(type) {
  if (type === "pe") {
    globalData.sort((a,b) => a.pe - b.pe);
  }
  render(globalData);
}

/* MINI CHART */
function drawChart() {
  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");

  ctx.beginPath();
  ctx.moveTo(0,50);

  for(let i=0;i<10;i++){
    ctx.lineTo(i*30, Math.random()*100);
  }

  ctx.strokeStyle = "lime";
  ctx.stroke();
}

loadData();

</script>

</body>
</html>
