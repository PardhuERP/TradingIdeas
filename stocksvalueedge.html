<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial;
  background: #020617;
  color: white;
}

/* GRID */
.container {
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

/* CARD */
.card {
  background: #1e293b;
  border-radius: 18px;
  padding: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.6);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* HEADER */
.title {
  font-size: 13px;
  opacity: 0.7;
}

.price {
  font-size: 22px;
  font-weight: bold;
  margin-top: 2px;
}

.change {
  font-size: 12px;
  margin-bottom: 8px;
}

.green { color: #22c55e; }
.red { color: #ef4444; }

/* DATA ROW */
.row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  margin: 2px 0;
}

/* STATUS BADGE */
.status {
  margin-top: 8px;
  padding: 6px;
  border-radius: 10px;
  text-align: center;
  font-size: 11px;
  font-weight: bold;
}

 .filters {
  display: flex;
  gap: 8px;
  padding: 10px;
  justify-content: center;
}

.filters button {
  background: #1e293b;
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
}

.filters button:hover {
  background: #334155;
} 

/* COLORS */
.cheap { background: rgba(34,197,94,0.15); color: #22c55e; }
.fair { background: rgba(250,204,21,0.15); color: #facc15; }
.expensive { background: rgba(239,68,68,0.15); color: #ef4444; }

</style>
</head>

<body>
  <div class="filters">
  <button onclick="applyFilter('ALL')">All</button>
  <button onclick="applyFilter('CHEAP')">Cheap</button>
  <button onclick="applyFilter('FAIR')">Fair</button>
  <button onclick="applyFilter('EXPENSIVE')">Expensive</button>
</div>

<div class="container" id="grid"></div>

<script>
 const url = "https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec?action=market";

let allData = [];

// 🔥 FETCH DATA
fetch(url)
.then(res => res.json())
.then(data => {
  allData = data;
  renderCards(data);
});

// 🔥 RENDER FUNCTION
function renderCards(data) {

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  // SORT BY PE
  data.sort((a, b) => parseFloat(a.pe) - parseFloat(b.pe));

  data.forEach(stock => {

    if (!stock) return;

    const card = document.createElement("div");
    card.className = "card";

    // CLICK NAVIGATION
    card.onclick = () => {
      window.location.href = "detail.html?symbol=" + stock.symbol;
    };

    const changeClass = stock.change >= 0 ? "green" : "red";
    const statusClass = stock.status.toLowerCase();

    // ALERT BORDER
    if (parseFloat(stock.pe) > 25) {
      card.style.border = "1px solid red";
    }

    // FORMAT
    const price = parseFloat(stock.price).toFixed(2);
    const change = parseFloat(stock.change).toFixed(2);
    const percent = parseFloat(stock.percent).toFixed(2);
    const pe = parseFloat(stock.pe).toFixed(2);

    card.innerHTML = `
      <div>
        <div class="title">${stock.name}</div>
        <div class="price">${price}</div>
        <div class="change ${changeClass}">
          ${change} (${percent}%)
        </div>
      </div>

      <div>
        <div class="row">
          <span>EPS</span>
          <span>${stock.eps}</span>
        </div>

        <div class="row">
          <span>P/E</span>
          <span>${pe}</span>
        </div>
      </div>

      <div class="status ${statusClass}">
        ${stock.status}
      </div>
    `;

    // TOUCH EFFECT
    card.style.transition = "0.2s";
    card.onmousedown = () => card.style.transform = "scale(0.97)";
    card.onmouseup = () => card.style.transform = "scale(1)";

    grid.appendChild(card);
  });
}

// 🔥 FILTER FUNCTION
function applyFilter(type) {

  if (type === "ALL") {
    renderCards(allData);
    return;
  }

  const filtered = allData.filter(s => s.status === type);
  renderCards(filtered);
}
</script>

</body>
</html>
