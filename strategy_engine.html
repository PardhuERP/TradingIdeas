<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Strategy Engine | Educational purpose only</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#0b0b0b;
  color:#fff;
  font-family:Arial;
  padding:15px;
}
h2{text-align:center;margin-bottom:20px;}

.card{
  background:#111;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

select,input{
  width:100%;
  padding:8px;
  margin-bottom:12px;
  background:#1a1a1a;
  border:none;
  color:#fff;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  background:#00bcd4;
  border:none;
  font-weight:bold;
  border-radius:8px;
  cursor:pointer;
}

.result{
  margin-top:15px;
  padding:15px;
  border-radius:12px;
  background:#151515;
}

.green{color:#00ff99;}
.gold{color:gold;}
.blue{color:#00bcd4;}
.red{color:#ff5252;}
</style>
</head>

<body>

<h2>📊 Smart Options Strategy</h2>

<div class="card">
<b>Market Bias</b>
<select id="bias">
<option>Strong Bullish</option>
<option>Mild Bullish</option>
<option>Neutral</option>
<option>Mild Bearish</option>
<option>Strong Bearish</option>
</select>

<b>Volatility</b>
<select id="vol">
<option>Low</option>
<option>Normal</option>
<option>High</option>
</select>

<b>Days to Expiry</b>
<input id="dte" type="number" placeholder="Enter days (3, 7, 15)">
</div>

<button onclick="analyze()">Analyze Strategy</button>

<div id="output" class="result"></div>

<script>
function analyze(){

let bias = document.getElementById("bias").value;
let vol = document.getElementById("vol").value;
let dte = parseInt(document.getElementById("dte").value);

let main="", alt1="", alt2="", risk="", reason="";

/* Decision Logic */

if(bias==="Strong Bullish" && vol==="Low"){
  main="Buy CE";
  alt1="Bull Call Spread";
  alt2="Long Straddle";
  risk="High Reward / High Risk";
}

else if(bias==="Strong Bearish" && vol==="Low"){
  main="Buy PE";
  alt1="Bear Put Spread";
  alt2="Long Straddle";
  risk="High Reward / High Risk";
}

else if(bias==="Mild Bullish" && vol==="High"){
  main="Bull Put Spread";
  alt1="Sell PE";
  alt2="Iron Fly";
  risk="Moderate";
}

else if(bias==="Mild Bearish" && vol==="High"){
  main="Bear Call Spread";
  alt1="Sell CE";
  alt2="Iron Fly";
  risk="Moderate";
}

else if(bias==="Neutral" && vol==="High" && dte>5){
  main="Iron Condor";
  alt1="Short Strangle";
  alt2="Iron Fly";
  risk="Low to Moderate";
}

else if(bias==="Neutral" && vol==="High" && dte<=5){
  main="Iron Fly";
  alt1="Short Straddle";
  alt2="Iron Condor";
  risk="Moderate";
}

else{
  main="Long Straddle";
  alt1="Long Strangle";
  alt2="Wait / No Trade";
  risk="Depends on breakout";
}

reason = `Bias: ${bias} | Volatility: ${vol} | DTE: ${dte}`;

document.getElementById("output").innerHTML=
`
<b>Main Strategy:</b> <span class="green">${main}</span><br><br>
<b>Alternative 1:</b> ${alt1}<br>
<b>Alternative 2:</b> ${alt2}<br><br>

<b>Risk Level:</b> <span class="gold">${risk}</span><br><br>

<hr>
<b>Analysis:</b><br>
${reason}
`;
}
</script>

</body>
</html>
