<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Strategy List | Educational purpose only</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#0b0b0b;
  color:#fff;
  font-family:Arial;
  padding:15px;
}

h2{
  text-align:center;
  margin-bottom:20px;
}

.section{
  background:#111;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

.section-title{
  font-size:14px;
  font-weight:bold;
  margin-bottom:10px;
  color:#00bcd4;
}

ul{
  list-style:none;
  padding:0;
  margin:0;
}

li{
  padding:8px 0;
  border-bottom:1px solid #222;
  font-size:13px;
  cursor:pointer;
}

li:last-child{
  border-bottom:none;
}

li:hover{
  color:#00ff99;
}

.topbar{
  display:flex;
  align-items:center;
  margin-bottom:15px;
}

.back{
  color:#00bcd4;
  cursor:pointer;
  font-size:14px;
}

/* ===== MODAL ===== */

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  z-index:100;
}

.modal-box{
  background:#111;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:420px;
  max-height:80vh;
  overflow:auto;
}

.close{
  text-align:right;
  cursor:pointer;
  color:#00bcd4;
  font-size:14px;
  margin-bottom:10px;
}

.example{
  margin-top:10px;
  background:#1a1a1a;
  padding:10px;
  border-radius:8px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="back" onclick="history.back()">⬅ Back</div>
</div>

<h2>📊 Options Strategy List</h2>

<div class="section">
<div class="section-title">Directional Strategies</div>
<ul>
<li onclick="openPopup('Buy Call')">Buy Call (Long Call)</li>
<li onclick="openPopup('Buy Put')">Buy Put (Long Put)</li>
<li onclick="openPopup('Bull Call Spread')">Bull Call Spread</li>
<li onclick="openPopup('Bear Put Spread')">Bear Put Spread</li>
</ul>
</div>

<div class="section">
<div class="section-title">Neutral Strategies</div>
<ul>
<li onclick="openPopup('Iron Condor')">Iron Condor</li>
<li onclick="openPopup('Short Straddle')">Short Straddle</li>
<li onclick="openPopup('Long Straddle')">Long Straddle</li>
</ul>
</div>

<!-- ===== MODAL ===== -->

<div id="modal" class="modal">
  <div class="modal-box">
    <div class="close" onclick="closePopup()">✖ Close</div>
    <h3 id="title"></h3>
    <p id="desc" style="font-size:13px;line-height:1.6;"></p>
    <div class="example" id="example"></div>
  </div>
</div>

<script>

const strategyData = {

"Buy Call": {
desc: "Used when you expect strong bullish move. Risk limited to premium paid. Profit unlimited.",
example: "Example:\nStock: CIPLA = 1350\nBuy 1400 CE @ 25\nIf price moves to 1500 → option may go to 110\nProfit = 85 per lot\nMax loss = 25"
},

"Buy Put": {
desc: "Used when expecting strong downside. Risk limited to premium paid.",
example: "Example:\nStock: CIPLA = 1350\nBuy 1300 PE @ 20\nIf price falls to 1200 → option may go to 90\nProfit = 70\nMax loss = 20"
},

"Bull Call Spread": {
desc: "Moderate bullish strategy. Limited profit and limited risk.",
example: "Example:\nBuy 1400 CE @ 30\nSell 1450 CE @ 15\nNet cost = 15\nMax profit = 35\nMax loss = 15"
},

"Bear Put Spread": {
desc: "Moderate bearish strategy. Limited risk and limited reward.",
example: "Example:\nBuy 1350 PE @ 28\nSell 1300 PE @ 14\nNet cost = 14\nMax profit = 36"
},

"Iron Condor": {
desc: "Used in sideways markets. Profit from time decay. Limited risk.",
example: "Example:\nSell 1400 CE\nBuy 1450 CE\nSell 1300 PE\nBuy 1250 PE\nProfit if price stays between 1300–1400"
},

"Short Straddle": {
desc: "High risk strategy. Profit if market stays at same level.",
example: "Example:\nSell 1350 CE & 1350 PE\nCollect premium 60\nProfit if price near 1350\nUnlimited risk if breakout"
},

"Long Straddle": {
desc: "Used before big event. Profit from strong move either side.",
example: "Example:\nBuy 1350 CE @ 30\nBuy 1350 PE @ 28\nTotal cost = 58\nNeed big move above 1408 or below 1292"
}

};

function openPopup(name){
  document.getElementById("title").innerText = name;
  document.getElementById("desc").innerText = strategyData[name].desc;
  document.getElementById("example").innerText = strategyData[name].example;
  document.getElementById("modal").style.display="flex";
}

function closePopup(){
  document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
