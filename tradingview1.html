<!DOCTYPE html>
<html>
<head>
  <title>Trading Dashboard</title>
  <script src="https://s3.tradingview.com/tv.js"></script>
</head>

<body style="background:black;color:white">

<h2>📊 My Trading Dashboard</h2>

<div id="stocks"></div>

<div id="chart" style="height:400px;"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec";

async function loadData(){
  const res = await fetch(API);
  const data = await res.json();

  let html = "";

  data.slice(1).forEach(row => {
    const symbol = row[0];
    const volume = row[1];
    const spike = row[3];
    const rsi = row[5];
    const signal = row[6];

    html += `
      <div onclick="openChart('${symbol}')"
        style="padding:10px;border-bottom:1px solid #333">
        <b>${symbol}</b> | Vol: ${volume} | RSI: ${rsi}
        <br>${spike} ${signal}
      </div>
    `;
  });

  document.getElementById("stocks").innerHTML = html;
}
</script>

</body>
</html>
