<!DOCTYPE html>
<html>
<head>
  <title>Trading Dashboard</title>
  <script src="https://s3.tradingview.com/tv.js"></script>

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
    }

    .stock {
      padding: 10px;
      border-bottom: 1px solid #333;
      cursor: pointer;
    }

    .stock:hover {
      background: #111;
    }

    .spike {
      color: #00e6e6;
      font-weight: bold;
    }

    .buy {
      color: #00ff00;
      font-weight: bold;
    }

    .sell {
      color: #ff4444;
      font-weight: bold;
    }

    .highvol {
      background: rgba(0,255,0,0.08);
    }
  </style>
</head>
  <audio id="alertSound" src="https://www.soundjay.com/buttons/sounds/beep-01a.mp3"></audio>

<body>

<h2>📊 My Trading Dashboard</h2>

<div id="stocks">Loading...</div>

<div id="chart" style="height:400px;margin-top:20px;"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec?action=nse";
let previousSignals = new Set();
async function loadData(){
  try {
    const res = await fetch(API);
    const data = await res.json();

    let rows = data.slice(1);

// sort (same as before)
rows.sort((a, b) => {
  const scoreA = (a[5] || 0) * (a[1] || 0);
  const scoreB = (b[5] || 0) * (b[1] || 0);
  return scoreB - scoreA;
});

let html = "";
let hasSignal = false;
let currentSignals = new Set();

rows.forEach(row => {
  const symbol = row[0];
  const volume = row[1];
  const avgVol = row[2];
  const spike = row[3] || "";
  let rsi = row[5];
  const signal = row[6] || "";

  rsi = rsi ? Number(rsi).toFixed(2) : "--";

  // detect spike condition
  let isSpike = spike !== "" || signal.includes("BUY");

  if (isSpike) {
    hasSignal = true;
    currentSignals.add(symbol);

    // 🔔 NEW ALERT DETECT
    if (!previousSignals.has(symbol)) {
      document.getElementById("alertSound").play();
    }

    let signalClass = "";
    if(signal.includes("BUY")) signalClass = "buy";
    if(signal.includes("SELL")) signalClass = "sell";

    let volClass = "";
    if (avgVol && volume > 2 * avgVol) volClass = "highvol";

    html += `
      <div class="stock ${volClass}" onclick="openChart('${symbol}')">
        <b>${symbol}</b> | Vol: ${volume} | RSI: ${rsi}
        <br>
        <span class="spike">${spike}</span>
        <span class="${signalClass}">${signal}</span>
      </div>
    `;
  }
});

// update memory
previousSignals = currentSignals;

// fallback (same as before)
if (!hasSignal) {
  html = "<h3>📊 Top Volume Stocks</h3>";

  rows.sort((a, b) => (b[1] || 0) - (a[1] || 0));

  rows.slice(0, 5).forEach(row => {
    const symbol = row[0];
    const volume = row[1];
    let rsi = row[5];

    rsi = rsi ? Number(rsi).toFixed(2) : "--";

    html += `
      <div class="stock" onclick="openChart('${symbol}')">
        <b>${symbol}</b> | Vol: ${volume} | RSI: ${rsi}
      </div>
    `;
  });
}

    document.getElementById("stocks").innerHTML = html;

  } catch (err) {
    document.getElementById("stocks").innerHTML = "❌ Error loading data";
    console.error(err);
  }
}

// 📈 Chart
function openChart(symbol){
  const tvUrl = "https://www.tradingview.com/chart/?symbol=NSE:" + symbol;

  try {
    window.open(tvUrl, "_blank");
  } catch(e) {
    const invUrl = "https://www.investing.com/search/?q=" + symbol;
    window.open(invUrl, "_blank");
  }
}

// 🔄 Auto refresh
setInterval(loadData, 60000);
loadData();

</script>

</body>
</html>
