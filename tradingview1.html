<!DOCTYPE html>  
<html>  
<head>  
  <title>Trading Dashboard</title>  
  <script src="https://s3.tradingview.com/tv.js"></script>  
  
  <style>  
    body {
  margin: 0;
  font-family: 'Segoe UI', Arial;
  background: #020617;
  color: white;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  background: #020617;
  padding: 12px;
  font-size: 18px;
  font-weight: bold;
  border-bottom: 1px solid #111;
  z-index: 100;
}

/* GRID */
.container {
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* CARD */
.card {
  background: #1e293b;
  border-radius: 16px;
  padding: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.6);
  transition: 0.2s;
}

.card:active {
  transform: scale(0.97);
}

/* TOP ROW */
.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.symbol {
  font-size: 16px;
  font-weight: bold;
}

.rsi {
  font-size: 13px;
  opacity: 0.7;
}

/* DATA */
.meta {
  font-size: 13px;
  margin-top: 5px;
  opacity: 0.8;
}

/* SIGNAL */
.signal {
  margin-top: 8px;
  font-size: 13px;
  font-weight: bold;
}

.buy { color: #22c55e; }
.sell { color: #ef4444; }
.spike { color: #00e6e6; }

/* HIGHLIGHT */
.highvol {
  border: 1px solid #22c55e;
}
  </style>  
</head>  

<body>  

<!-- 🔔 ALERT SOUND -->
<audio id="alertSound" src="https://www.soundjay.com/buttons/sounds/beep-01a.mp3"></audio>  

<!-- ✅ HEADER -->
<div class="header">📊 My Trading Dashboard</div>

<!-- ✅ STOCK LIST -->
<div class="container" id="stocks"></div>

<!-- 📊 CHART -->
<div id="chart" style="height:300px;margin:10px;"></div>

<script>  
const API = "https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec?action=nse";  

let previousSignals = new Set();  
let lastAlertTime = 0; // 🔔 cooldown control  

async function loadData(){  
  try {  
    const res = await fetch(API);  
    const data = await res.json();  

    let rows = data.slice(1);  

    // 🔥 sort RSI + volume  
    rows.sort((a, b) => {  
      const scoreA = (Number(a[5]) || 0) * (Number(a[1]) || 0);  
      const scoreB = (Number(b[5]) || 0) * (Number(b[1]) || 0);  
      return scoreB - scoreA;  
    });  

    let html = "";  
    let hasSignal = false;  
    let currentSignals = new Set();  

    rows.forEach(row => {  
      const symbol = row[0];  
      const volume = Number(row[1]) || 0;  
      const avgVol = Number(row[2]) || 0;  
      const spike = row[3] || "";  
      let rsi = row[5];  
      const signal = row[6] || "";  

      rsi = rsi ? Number(rsi).toFixed(2) : "--";  

      let isSpike = spike !== "" || signal.includes("BUY");  

      if (isSpike) {  
        hasSignal = true;  
        currentSignals.add(symbol);  

        // 🔔 ALERT with cooldown (5 sec)
        const now = Date.now();
        if (!previousSignals.has(symbol) && now - lastAlertTime > 5000) {

  const sound = document.getElementById("alertSound");
  if (sound) {
    sound.currentTime = 0;
    sound.play().catch(() => {});
  }

  // 🔥 POPUP ALERT
  showPopup(`🔥 ${symbol} Spike / BUY Signal`);

  // 📲 TELEGRAM ALERT
  sendTelegramAlert(symbol);

  lastAlertTime = now;
}

        let signalClass = "";  
        if(signal.includes("BUY")) signalClass = "buy";  
        if(signal.includes("SELL")) signalClass = "sell";  

        let volClass = "";  
        if (avgVol && volume > 2 * avgVol) volClass = "highvol";  

        html += `
  <div class="card ${volClass}" onclick="openChart('${symbol}')">

    <div class="top">
      <div class="symbol">${symbol}</div>
      <div class="rsi">RSI: ${rsi}</div>
    </div>

    <div class="meta">
      Volume: ${volume}
    </div>

    <div class="signal">
      <span class="spike">${spike}</span>
      <span class="${signalClass}">${signal}</span>
    </div>

  </div>
`;  
      }  
    });  

    previousSignals = currentSignals;  

    // 🔥 fallback  
    if (!hasSignal) {  
      html = "<h3>📊 Top Volume Stocks</h3>";  

      rows.sort((a, b) => (Number(b[1]) || 0) - (Number(a[1]) || 0));  

      rows.slice(0, 5).forEach(row => {  
        const symbol = row[0];  
        const volume = row[1];  
        let rsi = row[5];  

        rsi = rsi ? Number(rsi).toFixed(2) : "--";  

        html += `
  <div class="card" onclick="openChart('${symbol}')">

    <div class="top">
      <div class="symbol">${symbol}</div>
      <div class="rsi">RSI: ${rsi}</div>
    </div>

    <div class="meta">
      Volume: ${volume}
    </div>

  </div>
`;
      });  
    }  

    document.getElementById("stocks").innerHTML = html;  

  } catch (err) {  
    document.getElementById("stocks").innerHTML = "❌ Error loading data";  
    console.error(err);  
  }  
}  

  function showPopup(message){
  const popup = document.createElement("div");
  popup.innerText = message;

  popup.style.position = "fixed";
  popup.style.top = "20px";
  popup.style.right = "20px";
  popup.style.background = "#111";
  popup.style.color = "#00ffcc";
  popup.style.padding = "10px 15px";
  popup.style.border = "1px solid #00ffcc";
  popup.style.borderRadius = "5px";
  popup.style.zIndex = 9999;

  document.body.appendChild(popup);

  setTimeout(() => {
    popup.remove();
  }, 4000);
}

function sendTelegramAlert(symbol){
  const token = "8793429092:AAGd6JAer0ghmxS6y4VbtxBIKvnAprI8TCg";
  const chatId = "6354505660";

  const message = `🔥 ${symbol} Spike detected`;

  const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`;

  fetch(url).catch(err => console.log(err));
}

function openChart(symbol){  
  const tvUrl = "https://www.tradingview.com/chart/?symbol=NSE:" + symbol;  

  try {  
    window.open(tvUrl, "_blank");  
  } catch(e) {  
    const invUrl = "https://www.investing.com/search/?q=" + symbol;  
    window.open(invUrl, "_blank");  
  }  
}  

setInterval(loadData, 10000);  
loadData();  

</script>  

</body>  
</html>
