<!DOCTYPE html>
<html>
<head>
  <title>Trading Dashboard</title>
  <script src="https://s3.tradingview.com/tv.js"></script>
</head>

<body style="background:black;color:white">

<h2>📊 My Trading Dashboard</h2>

<div id="stocks"></div>

<div id="chart" style="height:400px;"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec";

async function loadData(){
  const res = await fetch(API);
  const data = await res.json();

  let html = "";

  data.slice(1).forEach(row => {
    const symbol = row[0];
    const price = row[1];
    const volume = row[2];
    const signal = row[5];

    html += `
      <div onclick="openChart('${symbol}')"
           style="padding:10px;border-bottom:1px solid gray;cursor:pointer">
        ${symbol} | ₹${price} | Vol: ${volume} | ${signal}
      </div>
    `;
  });

  document.getElementById("stocks").innerHTML = html;
}

function openChart(symbol){
  document.getElementById("chart").innerHTML = "";

  new TradingView.widget({
    container_id: "chart",
    symbol: "NSE:" + symbol,
    interval: "5",
    theme: "dark",
    studies: ["RSI@tv-basicstudies", "EMA@tv-basicstudies"]
  });
}

loadData();
</script>

</body>
</html>
