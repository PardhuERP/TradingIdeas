<!DOCTYPE html>
<html>
<head>
  <title>Trading Dashboard</title>
  <script src="https://s3.tradingview.com/tv.js"></script>

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
    }

    .stock {
      padding: 10px;
      border-bottom: 1px solid #333;
      cursor: pointer;
    }

    .stock:hover {
      background: #111;
    }

    .spike {
      color: #00e6e6;
      font-weight: bold;
    }

    .buy {
      color: #00ff00;
      font-weight: bold;
    }

    .sell {
      color: #ff4444;
      font-weight: bold;
    }

    .highvol {
      background: rgba(0,255,0,0.08);
    }
  </style>
</head>

<body>

<h2>📊 My Trading Dashboard</h2>

<div id="stocks">Loading...</div>

<div id="chart" style="height:400px;margin-top:20px;"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxaLJdfOHI2rmDGhI_WdjyWkHrAlycOCepsgORmNnbDXnWzNxtasdGZW3yxftKvWhq8Iw/exec?action=nse";

async function loadData(){
  try {
    const res = await fetch(API);
    const data = await res.json();

    let rows = data.slice(1);

    // 🔥 SORT by RSI + Volume combo
    rows.sort((a, b) => {
      const scoreA = (a[5] || 0) * (a[1] || 0);
      const scoreB = (b[5] || 0) * (b[1] || 0);
      return scoreB - scoreA;
    });

    let html = "";
    let hasSignal = false;

    rows.forEach(row => {
      const symbol = row[0];
      const volume = row[1];
      const avgVol = row[2]; // avg volume from sheet
      const spike = row[3] || "";
      let rsi = row[5];
      const signal = row[6] || "";

      rsi = rsi ? Number(rsi).toFixed(2) : "--";

      // 🔥 Volume > 2x highlight
      let volClass = "";
      if (avgVol && volume > 2 * avgVol) {
        volClass = "highvol";
      }

      if (spike !== "" || signal.includes("BUY")) {
        hasSignal = true;

        let signalClass = "";
        if(signal.includes("BUY")) signalClass = "buy";
        if(signal.includes("SELL")) signalClass = "sell";

        html += `
          <div class="stock ${volClass}" onclick="openChart('${symbol}')">
            <b>${symbol}</b> | Vol: ${volume} | RSI: ${rsi}
            <br>
            <span class="spike">${spike}</span>
            <span class="${signalClass}">${signal}</span>
          </div>
        `;
      }
    });

    // 🔥 FALLBACK → TOP 5 VOLUME
    if (!hasSignal) {
      html = "<h3>📊 Top Volume Stocks</h3>";

      // sort by volume
      rows.sort((a, b) => (b[1] || 0) - (a[1] || 0));

      rows.slice(0, 5).forEach(row => {
        const symbol = row[0];
        const volume = row[1];
        const avgVol = row[2];
        let rsi = row[5];

        rsi = rsi ? Number(rsi).toFixed(2) : "--";

        let volClass = "";
        if (avgVol && volume > 2 * avgVol) {
          volClass = "highvol";
        }

        html += `
          <div class="stock ${volClass}" onclick="openChart('${symbol}')">
            <b>${symbol}</b> | Vol: ${volume} | RSI: ${rsi}
          </div>
        `;
      });
    }

    document.getElementById("stocks").innerHTML = html;

  } catch (err) {
    document.getElementById("stocks").innerHTML = "❌ Error loading data";
    console.error(err);
  }
}

// 📈 Chart
function openChart(symbol){
  const tvUrl = "https://www.investing.com/chart/?symbol=NSE:" + symbol;

  try {
    window.open(tvUrl, "_blank");
  } catch(e) {
    const invUrl = "https://www.investing.com/search/?q=" + symbol;
    window.open(invUrl, "_blank");
  }
}

// 🔄 Auto refresh
setInterval(loadData, 60000);
loadData();

</script>

</body>
</html>
